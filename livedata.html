<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보유데이터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8f4fd;--white:#fff;--s2:#d4ecfa;--s3:#bfe0f5;
  --bd:#b3d4ea;--bd2:#8bbdd8;
  --t1:#0c2d42;--t2:#3a6a88;--t3:#7aaec8;
  --acc:#0ea5e9;--acc-dk:#0284c7;--acc-lt:#e0f2fe;--acc-md:#7dd3fc;--acc-tx:#0c4a6e;
  --ok:#059669;--ok-bg:#ecfdf5;--ok-bd:#6ee7b7;
  --warn:#d97706;--warn-bg:#fffbeb;--warn-bd:#fcd34d;
  --dp:#dc2626;--dp-bg:#fef2f2;--dp-bd:#fca5a5;
  --stage-ch:#0ea5e9;--stage-h:#8b5cf6;--stage-d1:#f59e0b;--stage-d2:#f97316;--stage-b:#10b981;--stage-ct:#6366f1;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
.stripe{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc-md));position:fixed;top:0;left:0;right:0;z-index:300}
.hdr{height:54px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:3px;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(8px)}
.hdr-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.03em;flex-shrink:0;color:var(--acc-dk)}
.logo-dot{width:9px;height:9px;background:var(--acc);border-radius:50%}
.hdr-tabs{display:flex;gap:0;background:var(--s2);border-radius:8px;padding:3px;border:1px solid var(--bd);margin-left:10px}
.hdr-tab{padding:4px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:none;border:none;color:var(--t2);transition:all .14s;white-space:nowrap;text-decoration:none;display:flex;align-items:center}
.hdr-tab:hover{color:var(--t1);background:var(--white)}
.hdr-tab.active{background:var(--acc);color:#fff;font-weight:700}
.hdr-r{margin-left:auto;display:flex;gap:7px;align-items:center}
.btn{background:var(--white);border:1px solid var(--bd2);color:var(--t1);border-radius:7px;padding:6px 13px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.btn:hover{border-color:var(--acc);background:var(--acc-lt)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-filter{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--white);color:var(--t2);transition:all .13s}
.btn-filter.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-filter:hover:not(.active){background:var(--s2)}

/* 필터 바 */
.filter-bar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.05em}

.content{max-width:1200px;margin:0 auto;padding:20px 20px 80px}
.section{margin-bottom:32px}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.section-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--acc-lt);color:var(--acc-tx);border:1px solid var(--acc-md);font-weight:700;font-family:'DM Mono',monospace}
.table-wrap{background:var(--white);border:1px solid var(--bd);border-radius:12px;overflow:auto;box-shadow:0 2px 12px rgba(14,165,233,.08)}

/* 표1 */
.stage-table{width:100%;border-collapse:collapse;font-size:14px}
.stage-table th{padding:9px 12px;font-size:14px;font-weight:700;text-align:center;border:1px solid var(--bd);white-space:nowrap}
.stage-table td{padding:9px 12px;border:1px solid var(--bd);text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:16px;vertical-align:middle;color:var(--t1)}
.stage-table td.region-td{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:16px;background:#f0f9ff;text-align:center}
.stage-table tr.total-row td{background:var(--acc-lt);font-weight:700;color:var(--acc-dk)}
.stage-table tr.total-row td.region-td{background:var(--acc);color:#fff}
.goal-cell{cursor:pointer;border-radius:4px;padding:2px 4px;transition:all .13s;min-width:28px;display:inline-block}
.goal-cell:hover{background:var(--acc-lt);color:var(--acc-dk);outline:1px dashed var(--acc)}
.goal-cell.editing{background:var(--acc-lt);outline:2px solid var(--acc);color:var(--t1)}
.rate-ok{color:var(--ok);background:var(--ok-bg);border-radius:4px;padding:2px 6px}
.rate-warn{color:var(--warn);background:var(--warn-bg);border-radius:4px;padding:2px 6px}
.rate-dp{color:var(--dp);background:var(--dp-bg);border-radius:4px;padding:2px 6px}

/* 표2 */
.meet-section{margin-bottom:16px}
.stage-meet-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px 10px 0 0;cursor:pointer;user-select:none}
.stage-meet-title{font-size:14px;font-weight:700;color:#fff}
.stage-meet-cnt{font-family:'DM Mono',monospace;font-size:11px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;color:#fff}
.stage-meet-tog{margin-left:auto;font-size:11px;color:rgba(255,255,255,.7)}
.meet-table{width:100%;border-collapse:collapse;font-size:14px}
.meet-table th{padding:9px 12px;font-size:13px;font-weight:700;text-align:center;border:1px solid var(--bd);white-space:nowrap}
.meet-table td{padding:8px 12px;border:1px solid var(--bd);text-align:center;vertical-align:middle;font-size:14px}
.meet-table td.region-td{font-weight:700;font-size:15px;background:#f0f9ff;text-align:center;white-space:nowrap}
.meet-table tr.total-row td{background:var(--acc-lt);font-weight:700;font-family:'DM Mono',monospace}
.meet-table tr.total-row td.region-td{background:var(--acc);color:#fff}
.chip-wrap{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.chip{font-size:10px;padding:1px 6px;border-radius:8px;white-space:nowrap;border:1px solid}
.chip-상담{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}
.chip-영따{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.chip-육따{background:#fef9c3;color:#854d0e;border-color:#fde047}
.chip-복음{background:#dcfce7;color:#166534;border-color:#86efac}
.chip-기타{background:var(--s2);color:var(--t2);border-color:var(--bd)}
.empty-dash{color:var(--t3)}

.spin{width:13px;height:13px;border:2px solid rgba(14,165,233,.2);border-top-color:var(--acc);border-radius:50%;animation:sp .65s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--t1);color:#fff;border-radius:20px;padding:9px 20px;font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="stripe"></div>
<div class="hdr">
  <div class="hdr-logo"><div class="logo-dot"></div>보유데이터</div>
  <div class="hdr-tabs">
    <a href="app.html" class="hdr-tab">📅 만캘</a>
    <a href="livedata.html" class="hdr-tab active">📊 보유</a>
    <a href="report.html" class="hdr-tab">📄 보고</a>
    <a href="goals.html" class="hdr-tab">🎯 목표</a>
  </div>
  <div class="hdr-r">
    <button class="btn btn-sm" onclick="loadData()"><span id="syncIcon">↺</span> 새로고침</button>
    <button class="btn btn-sm" onclick="sendToTelegram()" style="background:#229ED9;color:#fff;border-color:#229ED9">📤 텔레 전송</button>
    <button class="btn btn-sm" onclick="sendToMake()" style="background:#00bfae;color:#fff;border-color:#00bfae">Make로 전송</button>
    <a href="admin.html" class="btn btn-sm" style="text-decoration:none">관리자</a>
    <button class="btn btn-sm" onclick="doLogout()">로그아웃</button>

</div>

<!-- 필터 바 -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">개강</span>
    <button class="btn-filter active" onclick="setFilter('term','전체',this)">전체</button>
    <button class="btn-filter" onclick="setFilter('term','4월',this)">4월</button>
    <button class="btn-filter" onclick="setFilter('term','5월',this)">5월</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">구분</span>
    <button class="btn-filter active" onclick="setFilter('type','전체',this)">전체</button>
    <button class="btn-filter" onclick="setFilter('type','청년',this)">청년</button>
    <button class="btn-filter" onclick="setFilter('type','협력교회',this)">협력교회</button>
  </div>
</div>

<div class="content">
  <div class="section">
    <div class="section-hdr">
      <div class="section-title">📈 단계별 보유현황</div>
      <div class="section-badge" id="totalBadge">총 0명</div>
      <span style="font-size:11px;color:var(--t3)">🎯 목표 페이지에서 수정</span>
      <button class="btn btn-sm" onclick="downloadSection('stageSection','단계별보유현황')" style="margin-left:auto;font-size:11px">⬇ 저장</button>
    </div>
    <div id="stageSection">
    <div class="table-wrap">
      <table class="stage-table">
        <thead>
          <tr>
            <th rowspan="2" style="background:#bde0f5;color:var(--t1)">지역</th>
            <th colspan="4" style="background:#dbeafe;color:#1e40af">목표 (클릭해서 수정)</th>
            <th style="background:#e0f2fe;color:#0369a1" rowspan="2">CH<br><span style="font-size:9px;font-weight:400">찾기</span></th>
            <th style="background:#ede9fe;color:#6d28d9" rowspan="2">H<br><span style="font-size:9px;font-weight:400">합자</span></th>
            <th style="background:#fffbeb;color:#92400e" rowspan="2">D1<br><span style="font-size:9px;font-weight:400">육따</span></th>
            <th style="background:#fff7ed;color:#c2410c" rowspan="2">D2<br><span style="font-size:9px;font-weight:400">영따</span></th>
            <th style="background:#ecfdf5;color:#065f46" rowspan="2">B<br><span style="font-size:9px;font-weight:400">복</span></th>
            <th style="background:#eef2ff;color:#3730a3" rowspan="2">CT<br><span style="font-size:9px;font-weight:400">센확</span></th>
            <th style="background:var(--acc-lt);color:var(--acc-dk)" rowspan="2">합계</th>
            <th colspan="3" style="background:#fef9c3;color:#854d0e">달성%</th>
          </tr>
          <tr>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">센등</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">영따기</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">육따기</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">합자</th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">합자%</th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">육따%</th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">영따%</th>
          </tr>
        </thead>
        <tbody id="stageBody">
          <tr><td colspan="15" style="padding:40px;text-align:center;color:var(--t3);font-family:'Noto Sans KR',sans-serif;font-weight:400">데이터가 없습니다</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-hdr">
      <div class="section-title">📅 만남 현황</div>
      <div class="section-badge" id="meetBadge">오늘 기준</div>
      <button class="btn btn-sm" onclick="downloadMeet()" style="margin-left:auto;font-size:11px">⬇ 저장</button>
    </div>
    <div id="meetWrap">
      <div style="padding:40px;text-align:center;color:var(--t3)">데이터가 없습니다</div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SB_URL='https://tduhoyzgbkwhrvfadsww.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdWhveXpnYmt3aHJ2ZmFkc3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI3NjMsImV4cCI6MjA5MjQ5ODc2M30.yoAiBzAJCHnp_gtWzO2WooeIlVh8xRnpCmBZETrX-wg';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const LD_ID='00000000-0000-0000-0000-000000000002';
const GOALS_ID='00000000-0000-0000-0000-000000000003';
const MTG_ID='00000000-0000-0000-0000-000000000001';
const STAGES=['CH','H','D1','D2','B','CT'];
const STAGE_LABELS={CH:'찾기',H:'합자',D1:'육따',D2:'영따',B:'복',CT:'센확'};
const STAGE_COLORS={CH:'var(--stage-ch)',H:'var(--stage-h)',D1:'var(--stage-d1)',D2:'var(--stage-d2)',B:'var(--stage-b)',CT:'var(--stage-ct)'};

let ldData={people:[],goals:{},regionList:[],regionOrder:[]};
// goals 구조: {전체:{지역:{SE,H,D1,D2}}, 4월:{...}, 5월:{...}}
let filterTerm='전체'; // 전체/4월/5월
let filterType='전체'; // 전체/청년/협력교회

function getSession(){try{return JSON.parse(localStorage.getItem('mtg-user'));}catch{return null;}}
function doLogout(){localStorage.removeItem('mtg-user');localStorage.removeItem('mtg-enc-key');window.location.href='index.html';}
if(!getSession()){window.location.href='index.html';}

function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);}
function fmtDate(d){const r=new Date(d+'T00:00:00');return`${r.getMonth()+1}/${r.getDate()}`;}
function getDow(d){return['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];}

function goalsKey(){
  const t=filterTerm==='전체'?'전체':filterTerm;
  const tp=filterType==='전체'?'전체':filterType;
  return{t,tp};
}
function getGoals(){
  const {t,tp}=goalsKey();
  if(!ldData.goals)return{};
  // goals 구조: {4월: {청년: {화정: {SE,H,D1,D2}}}}
  const byTerm=ldData.goals[t]||{};
  return byTerm[tp]||{};
}

function getOrderedRegions(people){
  const all=[...new Set(people.map(p=>p.region).filter(Boolean))];
  const order=ldData.regionOrder||[];
  return[...order.filter(r=>all.includes(r)),...all.filter(r=>!order.includes(r))];
}

/* 필터 적용 */
function setFilter(key,val,el){
  if(key==='term') filterTerm=val;
  else filterType=val;
  // 버튼 active 상태
  el.closest('.filter-group').querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getFilteredPeople(){
  return ldData.people.filter(p=>{
    // 개강 필터: cohort 필드에 "4월" 또는 "5월" 포함 여부
    if(filterTerm!=='전체'){
if((p.term||'')!==filterTerm)return false;
    }
    // 구분 필터: cohort 첫 번째 값이 "청년" 또는 "협력교회"
    if(filterType!=='전체'){
      const c=(p.cohort||'').toString();
      if(filterType==='청년'&&!c.includes('청년'))return false;
      if(filterType==='협력교회'&&!c.includes('협력교회'))return false;
    }
    return true;
  });
}

async function loadData(){
  document.getElementById('syncIcon').innerHTML='<span class="spin"></span>';
  try{
    const r1=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${LD_ID}&select=data`,{headers:SB_HDR});
    const d1=await r1.json();
    if(d1&&d1[0]&&d1[0].data){
      const d=d1[0].data;
      ldData.people=d.people||[];
      // goals 구조 마이그레이션: flat → term별
      // goals는 003번 행에서 별도 로드 (아래에서 처리)
      const rawGoals={};
      ldData.goals={};
      ldData.regionList=d.regionList||[];
      ldData.regionOrder=d.regionOrder||[];
    }
    if(!ldData.regionOrder.length){
      const r2=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${MTG_ID}&select=data`,{headers:SB_HDR});
      const d2=await r2.json();
      if(d2&&d2[0]&&d2[0].data) ldData.regionOrder=d2[0].data.regionList||[];
    }
    // goals 003번 행에서 별도 로드
    try{
      const rg=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${GOALS_ID}&select=data`,{headers:SB_HDR});
      const dg=await rg.json();
      if(dg&&dg[0]&&dg[0].data) ldData.goals=dg[0].data;
      else ldData.goals={};
    }catch(e){ldData.goals={};}
    render();
  }catch(e){showToast('로드 오류: '+e.message);}
  document.getElementById('syncIcon').textContent='↺';
}

async function saveData(){
  try{
    const resp=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${LD_ID}`,{
      method:'PATCH',headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({data:{people:ldData.people,regionList:ldData.regionList,regionOrder:ldData.regionOrder}})
    });
    if(!resp.ok){const t=await resp.text();showToast('저장 오류: '+resp.status);console.error(t);}
    else{showToast('✓ 저장됨');}
  }catch(e){showToast('저장 오류: '+e.message);}
}

function render(){renderStageTable();renderMeetTables();}

function renderStageTable(){
  const people=getFilteredPeople();
  const regions=getOrderedRegions(people);
  const COLS=15;
  if(!people.length){
    document.getElementById('stageBody').innerHTML=`<tr><td colspan="${COLS}" style="padding:40px;text-align:center;color:var(--t3);font-family:'Noto Sans KR',sans-serif;font-weight:400">데이터가 없습니다</td></tr>`;
    document.getElementById('totalBadge').textContent='총 0명';return;
  }
  const countMap={},totRow={total:0};STAGES.forEach(s=>totRow[s]=0);
  regions.forEach(r=>{countMap[r]={total:0};STAGES.forEach(s=>countMap[r][s]=0);});
  people.forEach(p=>{if(!p.region||!countMap[p.region])return;countMap[p.region][p.stage]=(countMap[p.region][p.stage]||0)+1;countMap[p.region].total++;totRow[p.stage]=(totRow[p.stage]||0)+1;totRow.total++;});
  document.getElementById('totalBadge').textContent=`총 ${totRow.total}명`;
  const goals=getGoals();
  const sc={CH:'#0369a1',H:'#6d28d9',D1:'#92400e',D2:'#c2410c',B:'#065f46',CT:'#3730a3'};

  function rateCell(cnt,goal){
    if(!goal)return'';
    const r=Math.round(cnt/goal*100);
    return r;// 숫자만 반환, 셀 색상은 renderStageTable에서 처리
  }
  function rateCellStyle(r){
    if(r===null||r===undefined)return{bg:'transparent',color:'var(--t3)'};
    if(r>=100)return{bg:'#dcfce7',color:'#15803d'};
    if(r>=70)return{bg:'#fef9c3',color:'#854d0e'};
    if(r>=50)return{bg:'#ffedd5',color:'#c2410c'};
    return{bg:'#fee2e2',color:'#dc2626'};
  }

  // 목표 합산
  let totSE=0,totGH=0,totGD1=0,totGD2=0;
  regions.forEach(r=>{const g=goals[r]||{};totSE+=g.SE||0;totGH+=g.H||0;totGD1+=g.D1||0;totGD2+=g.D2||0;});

  const rows=regions.map(r=>{
    const g=goals[r]||{};
    const gSE=g.SE||0,gH=g.H||0,gD1=g.D1||0,gD2=g.D2||0;
    const c=countMap[r];
    const cH_up=c.H+c.D1+c.D2+c.B+c.CT;
    const cD1_up=c.D1+c.D2+c.B+c.CT;
    const cD2_up=c.D2+c.B+c.CT;
    return`<tr>
      <td class="region-td">${r}</td>
      <td style="background:#eef6ff"><span class="goal-cell" onclick="editGoal('${r}','SE',this)">${gSE||'—'}</span></td>
      <td style="background:#eef6ff"><span class="goal-cell" onclick="editGoal('${r}','D2',this)">${gD2||'—'}</span></td>
      <td style="background:#eef6ff"><span class="goal-cell" onclick="editGoal('${r}','D1',this)">${gD1||'—'}</span></td>
      <td style="background:#eef6ff"><span class="goal-cell" onclick="editGoal('${r}','H',this)">${gH||'—'}</span></td>
      ${STAGES.map(s=>`<td style="color:var(--t1)">${c[s]||0}</td>`).join('')}
      <td style="background:var(--acc-lt);color:var(--acc-dk);font-weight:700">${c.total}</td>
      ${(()=>{const rv=[rateCell(cH_up,gH),rateCell(cD1_up,gD1),rateCell(cD2_up,gD2)];return rv.map(r=>{if(r==='')return'<td style="color:var(--t3);font-size:16px">—</td>';const s=rateCellStyle(r);return`<td style="background:${s.bg};color:${s.color};font-weight:700;font-size:16px">${r}%</td>`;}).join('');})()}
    </tr>`;
  });

  // 합계 row (목표 합산 포함)
  const tot=totRow;
  const tH_up=tot.H+tot.D1+tot.D2+tot.B+tot.CT;
  const tD1_up=tot.D1+tot.D2+tot.B+tot.CT;
  const tD2_up=tot.D2+tot.B+tot.CT;
  rows.push(`<tr class="total-row">
    <td class="region-td">청년회</td>
    <td>${totSE||'—'}</td>
    <td>${totGD2||'—'}</td>
    <td>${totGD1||'—'}</td>
    <td>${totGH||'—'}</td>
    ${STAGES.map(s=>`<td style="color:var(--t1)">${tot[s]||0}</td>`).join('')}
    <td>${tot.total}</td>
    ${(()=>{const rv=[rateCell(tH_up,totGH),rateCell(tD1_up,totGD1),rateCell(tD2_up,totGD2)];return rv.map(r=>{if(r==='')return'<td style="color:var(--t3);font-size:16px">—</td>';const s=rateCellStyle(r);return`<td style="background:${s.bg};color:${s.color};font-weight:700;font-size:16px">${r}%</td>`;}).join('');})()}
  </tr>`);
  document.getElementById('stageBody').innerHTML=rows.join('');
}

function renderMeetTables(){
  const people=getFilteredPeople();
  const wrap=document.getElementById('meetWrap');
  if(!people.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">데이터가 없습니다</div>';return;}
  const tod=today(),d1=addDays(tod,1),d2=addDays(tod,2);
  const DATE_COLS=[
    {key:'today',label:'오늘',date:tod,isToday:true},
    {key:'d1',label:'내일',date:d1},
    {key:'d2',label:'모레',date:d2},
    {key:'after',label:'그이후',date:null},
    {key:'none',label:'만남미정',date:null},
  ];
  const regions=getOrderedRegions(people);
  let near3=0;
  people.forEach(p=>{if(p.nextDate&&(p.nextDate===tod||p.nextDate===d1||p.nextDate===d2))near3++;});
  document.getElementById('meetBadge').textContent=`3일 내 ${near3}명`;

  const html=STAGES.map(stage=>{
    const sp=people.filter(p=>p.stage===stage);
    if(!sp.length)return'';
    const colTots={today:0,d1:0,d2:0,after:0,none:0};
    sp.forEach(p=>{const nd=p.nextDate;if(!nd||nd<tod)colTots.none++;else if(nd===tod)colTots.today++;else if(nd===d1)colTots.d1++;else if(nd===d2)colTots.d2++;else colTots.after++;});
    const thCols=DATE_COLS.map(c=>`<th style="${c.isToday?'background:#fef9c3;color:#92400e':'background:var(--s2);color:var(--t2)'}">
      <span style="display:block;font-weight:700;font-size:14px">${c.label}</span>
      ${c.date?`<span style="font-size:11px;opacity:.8">${fmtDate(c.date)}(${getDow(c.date)})</span>`:''}
    </th>`).join('');
    const regionRows=regions.map(r=>{
      const rp=sp.filter(p=>p.region===r);
      if(!rp.length)return'';
      const buckets={today:[],d1:[],d2:[],after:[],none:[]};
      rp.forEach(p=>{const nd=p.nextDate;if(!nd||nd<tod)buckets.none.push(p);else if(nd===tod)buckets.today.push(p);else if(nd===d1)buckets.d1.push(p);else if(nd===d2)buckets.d2.push(p);else buckets.after.push(p);});
      const cells=DATE_COLS.map(c=>{
        const list=buckets[c.key]||[];
        if(!list.length)return`<td><span class="empty-dash">—</span></td>`;
        const chips=list.map(p=>`<span class="chip chip-${p.purpose}">${(p.people||'').split('-')[0]}/${p.purpose}</span>`).join('');
        return`<td><div class="chip-wrap">${chips}</div></td>`;
      }).join('');
      return`<tr><td class="region-td">${r}<div style="font-size:10px;color:var(--t3);font-family:'DM Mono',monospace">${rp.length}명</div></td>${cells}</tr>`;
    }).filter(Boolean);
    if(!regionRows.length)return'';
    const totCells=DATE_COLS.map(c=>`<td>${colTots[c.key]||0}</td>`).join('');
    return`<div class="meet-section">
      <div class="stage-meet-hdr" style="background:${STAGE_COLORS[stage]}" onclick="toggleStage(this)">
        <span class="stage-meet-title">${stage} · ${STAGE_LABELS[stage]}</span>
        <span class="stage-meet-cnt">${sp.length}명</span>
        <span style="margin-left:8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <span style="font-size:9px;background:#ede9fe;color:#6d28d9;border:1px solid #c4b5fd;border-radius:6px;padding:1px 5px">상담</span>
          <span style="font-size:9px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:6px;padding:1px 5px">영따</span>
          <span style="font-size:9px;background:#fef9c3;color:#854d0e;border:1px solid #fde047;border-radius:6px;padding:1px 5px">육따</span>
          <span style="font-size:9px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:6px;padding:1px 5px">복음</span>
          <span style="font-size:9px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:1px 5px">기타</span>
        </span>
        <span class="stage-meet-tog">▲</span>
      </div>
      <div class="table-wrap" style="border-radius:0 0 10px 10px;border-top:none">
        <table class="meet-table">
          <thead><tr><th style="background:#bde0f5;color:var(--t1)">지역</th>${thCols}</tr></thead>
          <tbody>
            ${regionRows.join('')}
            <tr class="total-row"><td class="region-td">합계</td>${totCells}</tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }).filter(Boolean).join('');
  wrap.innerHTML=html||'<div style="padding:40px;text-align:center;color:var(--t3)">만남 데이터가 없습니다</div>';
}

function toggleStage(hdr){
  const body=hdr.nextElementSibling;
  const tog=hdr.querySelector('.stage-meet-tog');
  if(body.style.display==='none'){body.style.display='';tog.textContent='▲';}
  else{body.style.display='none';tog.textContent='▼';}
}

function downloadMeet(){
  const el=document.getElementById('meetWrap');
  if(!el){showToast('데이터가 없어요');return;}
  showToast('이미지 저장 중...');

function downloadSection(id, filename){

    link.click();
    showToast('✓ 저장됐어요!');
  }).catch(e=>showToast('오류: '+e.message));
}

const TG_BOT_TOKEN='8767216429:AAHKpo0TRUNqCLsYkuYTBV1SAl_87K5RHVw';

async function uploadToImgbb(base64Img){
  // base64에서 Blob 생성
  const base64Data=base64Img.split(',')[1];
  const byteCharacters=atob(base64Data);
  const byteNumbers=new Array(byteCharacters.length);
  for(let i=0;i<byteCharacters.length;i++){byteNumbers[i]=byteCharacters.charCodeAt(i);}
  const byteArray=new Uint8Array(byteNumbers);
  const blob=new Blob([byteArray],{type:'image/png'});
  
  // 텔레그램에 직접 이미지 전송 (Blob을 File로)
  const file=new File([blob],'image.png',{type:'image/png'});
  const formData=new FormData();
  formData.append('photo',file);
  formData.append('chat_id',TG_CHAT_ID);
  formData.append('caption','📊 보유데이터');
  
  const response=await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendPhoto`,{
    method:'POST',
    body:formData
  });
  const result=await response.json();
  if(result.ok) return 'direct';
  throw new Error(result.description);
}

async function sendToTelegram(){
  showToast('이미지 준비 중...');
  const people=getFilteredPeople();
  const regions=getOrderedRegions(people);
  // 1. 단계별 보유현황 데이터 구성
  const countMap={},totRow={total:0};
  STAGES.forEach(s=>totRow[s]=0);
  regions.forEach(r=>{countMap[r]={total:0};STAGES.forEach(s=>countMap[r][s]=0);});
  people.forEach(p=>{if(!p.region||!countMap[p.region])return;countMap[p.region][p.stage]=(countMap[p.region][p.stage]||0)+1;countMap[p.region].total++;totRow[p.stage]=(totRow[p.stage]||0)+1;totRow.total++;});
  // 2. 만남 현황 데이터 구성
  const tod=today(),d1=addDays(tod,1),d2=addDays(tod,2);
  const meetCounts={};
  STAGES.forEach(s=>meetCounts[s]={today:0,d1:0,d2:0,after:0,none:0});
  people.forEach(p=>{
    const stage=p.stage;
    if(!meetCounts[stage])return;
    const nd=p.nextDate;
    if(!nd||nd<tod)meetCounts[stage].none++;
    else if(nd===tod)meetCounts[stage].today++;
    else if(nd===d1)meetCounts[stage].d1++;
    else if(nd===d2)meetCounts[stage].d2++;
    else meetCounts[stage].after++;
  });
  // 텍스트 캡션 구성
  const now=new Date().toISOString().slice(0,16).replace('T',' ');
  let caption=`📊 보유데이터 현황 ${now}\n\n`;
  caption+=`📈 단계별 보유현황 (${filterTerm}/${filterType})\n`;
  caption+=`📌 총 인원: ${totRow.total}명\n\n`;
  caption+=`■찾기 : ${totRow.CH||0}명\n`;
  caption+=`오늘 ${meetCounts.CH?.today||0} | 내일 ${meetCounts.CH?.d1||0} | 모레 ${meetCounts.CH?.d2||0}\n`;
  caption+=`이후 ${meetCounts.CH?.after||0} | 미정 ${meetCounts.CH?.none||0}\n\n`;
  caption+=`■합자 : ${totRow.H||0}명\n`;
  caption+=`오늘 ${meetCounts.H?.today||0} | 내일 ${meetCounts.H?.d1||0} | 모레 ${meetCounts.H?.d2||0}\n`;
  caption+=`이후 ${meetCounts.H?.after||0} | 미정 ${meetCounts.H?.none||0}\n\n`;
  caption+=`■육따 : ${totRow.D1||0}명\n`;
  caption+=`오늘 ${meetCounts.D1?.today||0} | 내일 ${meetCounts.D1?.d1||0} | 모레 ${meetCounts.D1?.d2||0}\n`;
  caption+=`이후 ${meetCounts.D1?.after||0} | 미정 ${meetCounts.D1?.none||0}\n\n`;
  caption+=`■영따 : ${totRow.D2||0}명\n`;
  caption+=`오늘 ${meetCounts.D2?.today||0} | 내일 ${meetCounts.D2?.d1||0} | 모레 ${meetCounts.D2?.d2||0}\n`;
  caption+=`이후 ${meetCounts.D2?.after||0} | 미정 ${meetCounts.D2?.none||0}\n\n`;
  caption+=`■복음방 : ${totRow.B||0}명\n`;
  caption+=`오늘 ${meetCounts.B?.today||0} | 내일 ${meetCounts.B?.d1||0} | 모레 ${meetCounts.B?.d2||0}\n`;
  caption+=`이후 ${meetCounts.B?.after||0} | 미정 ${meetCounts.B?.none||0}`;
  // 3. 만남 현황 - 모든 단계 펼치기
  document.querySelectorAll('.stage-meet-hdr').forEach(hdr=>{
    const body=hdr.nextElementSibling;
    body.style.display='';
    hdr.querySelector('.stage-meet-tog').textContent='▲';
  });
  try{
    // 1. 단계별 테이블 캡처
    const stageEl=document.querySelector('#stageSection .table-wrap');
    const stageCanvas=await html2canvas(stageEl,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
    const stageImg=stageCanvas.toDataURL('image/png');
    // 2. 만남 현황 - 각 단계별로 따로 캡처
    const meetEl=document.getElementById('meetWrap');
    const meetSections=meetEl.querySelectorAll('.meet-section');
    const images=[stageImg];
    for(let i=0;i<meetSections.length;i++){
      const section=meetSections[i];
      const sectionCanvas=await html2canvas(section,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      images.push(sectionCanvas.toDataURL('image/png'));
    }
    // 첫 번째 이미지만 텍스트와 함께 전송, 나머지는 순서대로
    showToast('텔레그램 전송 중...');
    for(let i=0;i<images.length;i++){
      const base64Data=images[i].split(',')[1];
      const byteCharacters=atob(base64Data);
      const byteNumbers=new Array(byteCharacters.length);
      for(let j=0;j<byteCharacters.length;j++){byteNumbers[j]=byteCharacters.charCodeAt(j);}
      const byteArray=new Uint8Array(byteNumbers);
      const blob=new Blob([byteArray],{type:'image/png'});
      const file=new File([blob],`image${i}.png`,{type:'image/png'});
      const formData=new FormData();
      formData.append('photo',file);
      formData.append('chat_id',TG_CHAT_ID);
      formData.append('caption',i===0?caption:'');
      const resp=await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendPhoto`,{method:'POST',body:formData});
      const result=await resp.json();
      if(!result.ok){console.error('Image',i,'error:',result);}
      showToast(`전송 중... (${i+1}/${images.length})`);
    }
    showToast('✓ 텔레그램으로 전송 완료!');
  }catch(e){
    showToast('✗ 전송 오류: '+e.message);
    console.error(e);
  }
}
