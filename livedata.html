<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보유데이터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8f4fd;--white:#fff;--s2:#d4ecfa;--s3:#bfe0f5;
  --bd:#b3d4ea;--bd2:#8bbdd8;
  --t1:#0c2d42;--t2:#3a6a88;--t3:#7aaec8;
  --acc:#0ea5e9;--acc-dk:#0284c7;--acc-lt:#e0f2fe;--acc-md:#7dd3fc;--acc-tx:#0c4a6e;
  --ok:#059669;--ok-bg:#ecfdf5;--ok-bd:#6ee7b7;
  --warn:#d97706;--warn-bg:#fffbeb;--warn-bd:#fcd34d;
  --dp:#dc2626;--dp-bg:#fef2f2;--dp-bd:#fca5a5;
  --stage-ch:#0ea5e9;--stage-h:#8b5cf6;--stage-d1:#f59e0b;--stage-d2:#f97316;--stage-b:#10b981;--stage-ct:#6366f1;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
.stripe{height:3px;background:linear-gradient(90deg,var(--acc),var(--acc-md));position:fixed;top:0;left:0;right:0;z-index:300}
.hdr{height:54px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:3px;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(8px)}
.hdr-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.03em;flex-shrink:0;color:var(--acc-dk)}
.logo-dot{width:9px;height:9px;background:var(--acc);border-radius:50%}
.hdr-tabs{display:flex;gap:0;background:var(--s2);border-radius:8px;padding:3px;border:1px solid var(--bd);margin-left:10px}
.hdr-tab{padding:4px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:none;border:none;color:var(--t2);transition:all .14s;white-space:nowrap;text-decoration:none;display:flex;align-items:center}
.hdr-tab:hover{color:var(--t1);background:var(--white)}
.hdr-tab.active{background:var(--acc);color:#fff;font-weight:700}
.hdr-r{margin-left:auto;display:flex;gap:7px;align-items:center}
.btn{background:var(--white);border:1px solid var(--bd2);color:var(--t1);border-radius:7px;padding:6px 13px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.btn:hover{border-color:var(--acc);background:var(--acc-lt)}
.btn-sm{padding:4px 9px;font-size:11px}
.content{max-width:1200px;margin:0 auto;padding:20px 20px 80px}
.section{margin-bottom:32px}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.section-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--acc-lt);color:var(--acc-tx);border:1px solid var(--acc-md);font-weight:700;font-family:'DM Mono',monospace}
.table-wrap{background:var(--white);border:1px solid var(--bd);border-radius:12px;overflow:auto;box-shadow:0 2px 12px rgba(14,165,233,.08)}

/* 표1 */
.stage-table{width:100%;border-collapse:collapse;font-size:12px}
.stage-table th{padding:8px 10px;font-size:11px;font-weight:700;text-align:center;border:1px solid var(--bd);white-space:nowrap}
.stage-table td{padding:8px 10px;border:1px solid var(--bd);text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:13px;vertical-align:middle}
.stage-table td.region-td{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;background:#f0f9ff;text-align:center}
.stage-table tr.total-row td{background:var(--acc-lt);font-weight:700;color:var(--acc-dk)}
.stage-table tr.total-row td.region-td{background:var(--acc);color:#fff}
.goal-cell{cursor:pointer;border-radius:4px;padding:2px 4px;transition:all .13s;min-width:28px;display:inline-block}
.goal-cell:hover{background:var(--acc-lt);color:var(--acc-dk);outline:1px dashed var(--acc)}
.goal-cell.editing{background:var(--acc-lt);outline:2px solid var(--acc);color:var(--t1)}
.rate-ok{color:var(--ok);background:var(--ok-bg);border-radius:4px;padding:2px 6px}
.rate-warn{color:var(--warn);background:var(--warn-bg);border-radius:4px;padding:2px 6px}
.rate-dp{color:var(--dp);background:var(--dp-bg);border-radius:4px;padding:2px 6px}

/* 표2 */
.meet-section{margin-bottom:16px}
.stage-meet-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px 10px 0 0;cursor:pointer;user-select:none}
.stage-meet-title{font-size:14px;font-weight:700;color:#fff}
.stage-meet-cnt{font-family:'DM Mono',monospace;font-size:11px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;color:#fff}
.stage-meet-tog{margin-left:auto;font-size:11px;color:rgba(255,255,255,.7)}
.meet-table{width:100%;border-collapse:collapse;font-size:12px}
.meet-table th{padding:8px 10px;font-size:10px;font-weight:700;text-align:center;border:1px solid var(--bd);white-space:nowrap;letter-spacing:.04em}
.meet-table td{padding:7px 10px;border:1px solid var(--bd);text-align:center;vertical-align:middle}
.meet-table td.region-td{font-weight:700;font-size:12px;background:#f0f9ff;text-align:center;white-space:nowrap}
.meet-table tr.total-row td{background:var(--acc-lt);font-weight:700;font-family:'DM Mono',monospace}
.meet-table tr.total-row td.region-td{background:var(--acc);color:#fff}
.chip-wrap{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.chip{font-size:10px;padding:1px 6px;border-radius:8px;white-space:nowrap;border:1px solid}
.chip-상담{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}
.chip-영따{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.chip-육따{background:#fef9c3;color:#854d0e;border-color:#fde047}
.chip-복음{background:#dcfce7;color:#166534;border-color:#86efac}
.chip-기타{background:var(--s2);color:var(--t2);border-color:var(--bd)}
.empty-dash{color:var(--t3)}

.spin{width:13px;height:13px;border:2px solid rgba(14,165,233,.2);border-top-color:var(--acc);border-radius:50%;animation:sp .65s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--t1);color:#fff;border-radius:20px;padding:9px 20px;font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="stripe"></div>
<div class="hdr">
  <div class="hdr-logo"><div class="logo-dot"></div>보유데이터</div>
  <div class="hdr-tabs">
    <a href="app.html" class="hdr-tab">📅 만캘</a>
    <a href="livedata.html" class="hdr-tab active">📊 Live Data</a>
  </div>
  <div class="hdr-r">
    <button class="btn btn-sm" onclick="loadData()"><span id="syncIcon">↺</span> 새로고침</button>
    <button class="btn btn-sm" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="content">
  <div class="section">
    <div class="section-hdr">
      <div class="section-title">📈 단계별 보유현황</div>
      <div class="section-badge" id="totalBadge">총 0명</div>
      <span style="font-size:11px;color:var(--t3)">목표 숫자 클릭해서 수정 가능</span>
    </div>
    <div class="table-wrap">
      <table class="stage-table">
        <thead>
          <tr>
            <th rowspan="2" style="background:#bde0f5;color:var(--t1)">지역</th>
            <th colspan="4" style="background:#dbeafe;color:#1e40af">목표 (클릭해서 수정)</th>
            <th style="background:#e0f2fe;color:#0369a1">CH<div style="font-size:9px;font-weight:400">찾기</div></th>
            <th style="background:#ede9fe;color:#6d28d9">H<div style="font-size:9px;font-weight:400">합자</div></th>
            <th style="background:#fffbeb;color:#92400e">D1<div style="font-size:9px;font-weight:400">육따</div></th>
            <th style="background:#fff7ed;color:#c2410c">D2<div style="font-size:9px;font-weight:400">영따</div></th>
            <th style="background:#ecfdf5;color:#065f46">B<div style="font-size:9px;font-weight:400">복</div></th>
            <th style="background:#eef2ff;color:#3730a3">CT<div style="font-size:9px;font-weight:400">센확</div></th>
            <th style="background:var(--acc-lt);color:var(--acc-dk)">합계</th>
            <th colspan="3" style="background:#fef9c3;color:#854d0e">달성%</th>
          </tr>
          <tr>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">센등</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">합자</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">육따기</th>
            <th style="background:#dbeafe;color:#1e40af;font-size:10px">영따기</th>
            <th style="background:#e0f2fe;color:#0369a1;font-size:9px"></th>
            <th style="background:#ede9fe;color:#6d28d9;font-size:9px"></th>
            <th style="background:#fffbeb;color:#92400e;font-size:9px"></th>
            <th style="background:#fff7ed;color:#c2410c;font-size:9px"></th>
            <th style="background:#ecfdf5;color:#065f46;font-size:9px"></th>
            <th style="background:#eef2ff;color:#3730a3;font-size:9px"></th>
            <th style="background:var(--acc-lt)"></th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">합자%</th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">육따%</th>
            <th style="background:#fef9c3;color:#854d0e;font-size:10px">영따%</th>
          </tr>
        </thead>
        <tbody id="stageBody">
          <tr><td colspan="12" style="padding:40px;text-align:center;color:var(--t3);font-family:'Noto Sans KR',sans-serif;font-weight:400">데이터가 없습니다</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-hdr">
      <div class="section-title">📅 만남 현황</div>
      <div class="section-badge" id="meetBadge">오늘 기준</div>
    </div>
    <div id="meetWrap">
      <div style="padding:40px;text-align:center;color:var(--t3)">데이터가 없습니다</div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SB_URL='https://tduhoyzgbkwhrvfadsww.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdWhveXpnYmt3aHJ2ZmFkc3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI3NjMsImV4cCI6MjA5MjQ5ODc2M30.yoAiBzAJCHnp_gtWzO2WooeIlVh8xRnpCmBZETrX-wg';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const LD_ID='00000000-0000-0000-0000-000000000002';
const MTG_ID='00000000-0000-0000-0000-000000000001';
const STAGES=['CH','H','D1','D2','B','CT'];
const STAGE_LABELS={CH:'찾기',H:'합자',D1:'육따',D2:'영따',B:'복',CT:'센확'};
const STAGE_COLORS={CH:'var(--stage-ch)',H:'var(--stage-h)',D1:'var(--stage-d1)',D2:'var(--stage-d2)',B:'var(--stage-b)',CT:'var(--stage-ct)'};
const STAGE_TXT={CH:'#0369a1',H:'#6d28d9',D1:'#92400e',D2:'#c2410c',B:'#065f46',CT:'#3730a3'};

let ldData={people:[],goals:{},regionList:[],regionOrder:[]};

function getSession(){try{return JSON.parse(localStorage.getItem('mtg-user'));}catch{return null;}}
function doLogout(){localStorage.removeItem('mtg-user');localStorage.removeItem('mtg-enc-key');window.location.href='index.html';}
if(!getSession()){window.location.href='index.html';}

function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d+'T00:00:00');r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);}
function fmtDate(d){const r=new Date(d+'T00:00:00');return`${r.getMonth()+1}/${r.getDate()}`;}
function getDow(d){return['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];}

function getOrderedRegions(){
  const all=[...new Set(ldData.people.map(p=>p.region).filter(Boolean))];
  const order=ldData.regionOrder||[];
  return[...order.filter(r=>all.includes(r)),...all.filter(r=>!order.includes(r))];
}

async function loadData(){
  document.getElementById('syncIcon').innerHTML='<span class="spin"></span>';
  try{
    const r1=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${LD_ID}&select=data`,{headers:SB_HDR});
    const d1=await r1.json();
    if(d1&&d1[0]&&d1[0].data){
      const d=d1[0].data;
      ldData.people=d.people||[];
      ldData.goals=d.goals||{};
      ldData.regionList=d.regionList||[];
      ldData.regionOrder=d.regionOrder||[];
    }
    // MTG regionList로 순서 보완
    if(!ldData.regionOrder.length){
      const r2=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${MTG_ID}&select=data`,{headers:SB_HDR});
      const d2=await r2.json();
      if(d2&&d2[0]&&d2[0].data) ldData.regionOrder=d2[0].data.regionList||[];
    }
    render();
  }catch(e){showToast('로드 오류: '+e.message);}
  document.getElementById('syncIcon').textContent='↺';
}

async function saveData(){
  try{
    await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${LD_ID}`,{
      method:'PATCH',headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({data:ldData})
    });
  }catch(e){showToast('저장 오류');}
}

function render(){renderStageTable();renderMeetTables();}

function renderStageTable(){
  const people=ldData.people,regions=getOrderedRegions();
  const COLS=14;
  if(!people.length){document.getElementById('stageBody').innerHTML=`<tr><td colspan="${COLS}" style="padding:40px;text-align:center;color:var(--t3);font-family:'Noto Sans KR',sans-serif;font-weight:400">데이터가 없습니다</td></tr>`;document.getElementById('totalBadge').textContent='총 0명';return;}
  const countMap={},totRow={total:0};STAGES.forEach(s=>totRow[s]=0);
  regions.forEach(r=>{countMap[r]={total:0};STAGES.forEach(s=>countMap[r][s]=0);});
  people.forEach(p=>{if(!p.region||!countMap[p.region])return;countMap[p.region][p.stage]=(countMap[p.region][p.stage]||0)+1;countMap[p.region].total++;totRow[p.stage]=(totRow[p.stage]||0)+1;totRow.total++;});
  document.getElementById('totalBadge').textContent=`총 ${totRow.total}명`;
  const goals=ldData.goals||{};
  const sc={CH:'#0369a1',H:'#6d28d9',D1:'#92400e',D2:'#c2410c',B:'#065f46',CT:'#3730a3'};

  function rateCell(cnt,goal){
    if(!goal)return'<span style="color:var(--t3)">—</span>';
    const r=Math.round(cnt/goal*100);
    return`<span class="${r>=100?'rate-ok':r>=70?'rate-warn':'rate-dp'}">${r}%</span>`;
  }

  const rows=regions.map(r=>{
    const g=goals[r]||{};
    const gSE=g.SE||0,gH=g.H||0,gD1=g.D1||0,gD2=g.D2||0;
    const c=countMap[r];
    // 합자% = H+D1+D2+B+CT 대비 목표합자
    const cH_up=c.H+c.D1+c.D2+c.B+c.CT;
    // 육따기% = D1+D2+B+CT 대비 목표육따기
    const cD1_up=c.D1+c.D2+c.B+c.CT;
    // 영따기% = D2+B+CT 대비 목표영따기
    const cD2_up=c.D2+c.B+c.CT;
    return`<tr>
      <td class="region-td">${r}</td>
      <td><span class="goal-cell" onclick="editGoal('${r}','SE',this)">${gSE||'—'}</span></td>
      <td><span class="goal-cell" onclick="editGoal('${r}','H',this)">${gH||'—'}</span></td>
      <td><span class="goal-cell" onclick="editGoal('${r}','D1',this)">${gD1||'—'}</span></td>
      <td><span class="goal-cell" onclick="editGoal('${r}','D2',this)">${gD2||'—'}</span></td>
      ${STAGES.map(s=>`<td style="color:${sc[s]}">${c[s]||0}</td>`).join('')}
      <td style="color:var(--acc-dk);font-weight:700">${c.total}</td>
      <td>${rateCell(cH_up,gH)}</td>
      <td>${rateCell(cD1_up,gD1)}</td>
      <td>${rateCell(cD2_up,gD2)}</td>
    </tr>`;
  });
  // 합계 row
  const tot=totRow;
  const tH_up=tot.H+tot.D1+tot.D2+tot.B+tot.CT;
  const tD1_up=tot.D1+tot.D2+tot.B+tot.CT;
  const tD2_up=tot.D2+tot.B+tot.CT;
  rows.push(`<tr class="total-row"><td class="region-td">청년회</td><td colspan="4"></td>${STAGES.map(s=>`<td>${tot[s]||0}</td>`).join('')}<td>${tot.total}</td><td colspan="3"></td></tr>`);
  document.getElementById('stageBody').innerHTML=rows.join('');
}

function editGoal(region,stage,el){
  el.classList.add('editing');el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function finish(){
    el.contentEditable='false';el.classList.remove('editing');
    const val=parseInt(el.textContent)||0;
    if(!ldData.goals[region])ldData.goals[region]={};
    ldData.goals[region][stage]=val;el.textContent=val||'—';
    saveData();renderStageTable();
  }
  el.onblur=finish;
  el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();finish();}if(e.key==='Escape')finish();};
}

function renderMeetTables(){
  const people=ldData.people,wrap=document.getElementById('meetWrap');
  if(!people.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">데이터가 없습니다</div>';return;}
  const tod=today(),d1=addDays(tod,1),d2=addDays(tod,2);
  const DATE_COLS=[
    {key:'today',label:'오늘',date:tod,isToday:true},
    {key:'d1',label:'내일',date:d1},
    {key:'d2',label:'모레',date:d2},
    {key:'after',label:'그이후',date:null},
    {key:'none',label:'만남미정',date:null},
  ];
  const regions=getOrderedRegions();
  let near3=0;
  people.forEach(p=>{if(p.nextDate&&(p.nextDate===tod||p.nextDate===d1||p.nextDate===d2))near3++;});
  document.getElementById('meetBadge').textContent=`3일 내 ${near3}명`;

  const html=STAGES.map(stage=>{
    const sp=people.filter(p=>p.stage===stage);
    if(!sp.length)return'';
    const colTots={today:0,d1:0,d2:0,after:0,none:0};
    sp.forEach(p=>{const nd=p.nextDate;if(!nd||nd<tod)colTots.none++;else if(nd===tod)colTots.today++;else if(nd===d1)colTots.d1++;else if(nd===d2)colTots.d2++;else colTots.after++;});
    const thCols=DATE_COLS.map(c=>`<th style="${c.isToday?'background:#fef9c3;color:#92400e':'background:var(--s2);color:var(--t2)'}">
      <span style="display:block;font-weight:700">${c.label}</span>
      ${c.date?`<span style="font-size:9px;opacity:.7">${fmtDate(c.date)}(${getDow(c.date)})</span>`:''}
    </th>`).join('');
    const regionRows=regions.map(r=>{
      const rp=sp.filter(p=>p.region===r);
      if(!rp.length)return'';
      const buckets={today:[],d1:[],d2:[],after:[],none:[]};
      rp.forEach(p=>{const nd=p.nextDate;if(!nd||nd<tod)buckets.none.push(p);else if(nd===tod)buckets.today.push(p);else if(nd===d1)buckets.d1.push(p);else if(nd===d2)buckets.d2.push(p);else buckets.after.push(p);});
      const cells=DATE_COLS.map(c=>{
        const list=buckets[c.key]||[];
        if(!list.length)return`<td><span class="empty-dash">—</span></td>`;
        const chips=list.map(p=>`<span class="chip chip-${p.purpose}">${(p.people||'').split('-')[0]||p.people}</span>`).join('');
        return`<td><div class="chip-wrap">${chips}</div></td>`;
      }).join('');
      return`<tr><td class="region-td">${r}<div style="font-size:10px;color:var(--t3);font-family:'DM Mono',monospace">${rp.length}명</div></td>${cells}</tr>`;
    }).filter(Boolean);
    if(!regionRows.length)return'';
    const totCells=DATE_COLS.map(c=>`<td>${colTots[c.key]||0}</td>`).join('');
    return`<div class="meet-section">
      <div class="stage-meet-hdr" style="background:${STAGE_COLORS[stage]}" onclick="toggleStage(this)">
        <span class="stage-meet-title">${stage} · ${STAGE_LABELS[stage]}</span>
        <span class="stage-meet-cnt">${sp.length}명</span>
        <span class="stage-meet-tog">▲</span>
      </div>
      <div class="table-wrap" style="border-radius:0 0 10px 10px;border-top:none">
        <table class="meet-table">
          <thead><tr><th style="background:#bde0f5;color:var(--t1)">지역</th>${thCols}</tr></thead>
          <tbody>
            ${regionRows.join('')}
            <tr class="total-row"><td class="region-td">합계</td>${totCells}</tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }).filter(Boolean).join('');
  wrap.innerHTML=html||'<div style="padding:40px;text-align:center;color:var(--t3)">만남 데이터가 없습니다</div>';
}

function toggleStage(hdr){
  const body=hdr.nextElementSibling;
  const tog=hdr.querySelector('.stage-meet-tog');
  if(body.style.display==='none'){body.style.display='';tog.textContent='▲';}
  else{body.style.display='none';tog.textContent='▼';}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
loadData();
</script>
</body>
</html>
