<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만남 양식 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--white:#fff;--bd:#dddcd2;--s2:#eae9e4;
  --t1:#1a1916;--t2:#6b6960;--t3:#aaa99f;
  --acc:#FAC608;--acc-dk:#c49600;--acc-lt:#fffae8;
  --ok:#15803d;--ok-bg:#dcfce7;
  --dp:#dc2626;--dp-bg:#fee2e2;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}

.hdr{height:52px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:15px;font-weight:700;flex:1}
.hdr-tab{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--white);color:var(--t2);text-decoration:none;transition:all .13s}
.hdr-tab:hover{border-color:var(--acc);background:var(--acc-lt)}
.hdr-tab.active{background:var(--acc);color:#1a1400;border-color:var(--acc);font-weight:700}

.content{max-width:800px;margin:0 auto;padding:20px}

/* 필터 카드 */
.filter-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:16px}
.filter-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--t1)}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.filter-group label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.04em}
.filter-group select{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);outline:none;cursor:pointer}
.filter-group select:focus{border-color:var(--acc)}

/* 날짜 범위 */
.date-range{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:14px}
.date-range input{padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);outline:none;width:100%}
.date-range input:focus{border-color:var(--acc)}
.date-sep{font-size:12px;color:var(--t3);text-align:center}

/* 버튼들 */
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .13s}
.btn-acc{background:var(--acc);color:#1a1400}
.btn-acc:hover{background:var(--acc-dk)}
.btn-secondary{background:var(--white);color:var(--t1);border:1px solid var(--bd)}
.btn-secondary:hover{background:var(--s2)}
.btn-copy{background:#0ea5e9;color:#fff}
.btn-copy:hover{background:#0284c7}

/* 결과 영역 */
.result-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:16px}
.result-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--s2)}
.result-title{font-size:13px;font-weight:700}
.result-body{padding:16px}
pre{font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;background:var(--bg);border-radius:8px;padding:14px;max-height:500px;overflow-y:auto;color:var(--t1)}

/* 토스트 */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--t1);color:#fff;border-radius:20px;padding:9px 20px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

/* 스핀 */
.spin{width:13px;height:13px;border:2px solid rgba(26,20,0,.2);border-top-color:var(--t1);border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

.empty-msg{padding:40px;text-align:center;color:var(--t3);font-size:13px}

@media(max-width:600px){
  .filter-grid{grid-template-columns:1fr}
  .date-range{grid-template-columns:1fr auto 1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-logo">📄 만남 양식 생성기</span>
  <a href="app.html" class="hdr-tab">📅 만캘</a>
  <a href="livedata.html" class="hdr-tab">📊 Live Data</a>
  <a href="report.html" class="hdr-tab active">📄 양식</a>
</div>

<div class="content">

  <!-- 필터 카드 -->
  <div class="filter-card">
    <div class="filter-title">📋 양식 생성 설정</div>

    <div class="filter-grid">
      <div class="filter-group">
        <label>개강</label>
        <select id="fTerm">
          <option value="">전체</option>
          <option value="4월">4월개강</option>
          <option value="5월">5월개강</option>
        </select>
      </div>
      <div class="filter-group">
        <label>구분</label>
        <select id="fType">
          <option value="">전체</option>
          <option value="청년">청년</option>
          <option value="협력교회">협력교회</option>
        </select>
      </div>
      <div class="filter-group">
        <label>지역</label>
        <select id="fRegion">
          <option value="">전체 지역</option>
        </select>
      </div>
      <div class="filter-group">
        <label>표시 형식</label>
        <select id="fFormat">
          <option value="daily">일별 만남 현황</option>
          <option value="summary">지역 요약</option>
        </select>
      </div>
    </div>

    <div class="date-range">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.04em">시작일</label>
        <input type="date" id="fStart">
      </div>
      <div class="date-sep" style="margin-top:20px">~</div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.04em">종료일</label>
        <input type="date" id="fEnd">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-acc" onclick="generate()" id="genBtn">✨ 양식 생성</button>
      <button class="btn btn-secondary" onclick="setThisWeek()">이번 주</button>
      <button class="btn btn-secondary" onclick="setToday()">오늘만</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="result-card" id="resultCard" style="display:none">
    <div class="result-hdr">
      <span class="result-title" id="resultTitle">생성된 양식</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-copy" onclick="copyText()" style="padding:6px 12px;font-size:12px">📋 복사</button>
        <button class="btn btn-secondary" onclick="downloadTxt()" style="padding:6px 12px;font-size:12px">⬇ 다운로드</button>
      </div>
    </div>
    <div class="result-body">
      <pre id="resultPre"></pre>
    </div>
  </div>

</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SB_URL='https://tduhoyzgbkwhrvfadsww.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdWhveXpnYmt3aHJ2ZmFkc3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI3NjMsImV4cCI6MjA5MjQ5ODc2M30.yoAiBzAJCHnp_gtWzO2WooeIlVh8xRnpCmBZETrX-wg';
const SB_ID='00000000-0000-0000-0000-000000000001';
const SB_HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

let db={meetings:[]},regionList=[],cohortList=[];
let generatedText='';

/* ── AUTH ── */
function getSession(){try{return JSON.parse(localStorage.getItem('mtg-user'));}catch{return null;}}
if(!getSession()){window.location.href='index.html';}

/* ── INIT ── */
async function init(){
  // 날짜 기본값 (이번 주 월~일)
  setThisWeek();

  // 캐시 먼저
  const cache=localStorage.getItem('mtg-cache');
  if(cache){const s=JSON.parse(cache);db=s.db||{meetings:[]};regionList=s.regionList||[];cohortList=s.cohortList||[];buildRegionSel();}

  // Supabase
  try{
    const resp=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${SB_ID}&select=data`,{headers:SB_HDR});
    const rows=await resp.json();
    if(rows&&rows[0]&&rows[0].data){
      const d=rows[0].data;
      db=d.db||{meetings:[]};
      regionList=d.regionList||[];
      cohortList=d.cohortList||[];
      buildRegionSel();
    }
  }catch(e){console.warn(e);}
}

function buildRegionSel(){
  const sel=document.getElementById('fRegion');
  const cur=sel.value;
  sel.innerHTML='<option value="">전체 지역</option>'+regionList.map(r=>`<option value="${r}">${r}</option>`).join('');
  if(cur)sel.value=cur;
}

function setThisWeek(){
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('fStart').value=mon.toISOString().slice(0,10);
  document.getElementById('fEnd').value=sun.toISOString().slice(0,10);
}
function setToday(){
  const t=new Date().toISOString().slice(0,10);
  document.getElementById('fStart').value=t;
  document.getElementById('fEnd').value=t;
}

/* ── 상태 이모지 ── */
function cfEmoji(m){
  const r=m.resultStatus||'';
  const c=m.confirmStatus||'미확티';
  if(r==='단계향상')return'🎉';
  if(r==='만남유지')return'✔️';
  if(r==='만남후탈락')return'🚫';
  if(r==='탈락전')return'❌';
  if(c==='확티')return'🟢';
  if(c==='전티완료')return'🟡';
  if(c==='만남밀림'||c==='만남연기')return'🔺';
  if(c==='만남전탈락')return'❌';
  return'🔴';
}

function countStats(list){
  return{
    total:list.length,
    up:list.filter(m=>m.resultStatus==='단계향상').length,
    done:list.filter(m=>m.resultStatus==='만남유지').length,
    ok:list.filter(m=>m.confirmStatus==='확티'&&!m.resultStatus).length,
    pt:list.filter(m=>m.confirmStatus==='전티완료'&&!m.resultStatus).length,
    un:list.filter(m=>(m.confirmStatus||'미확티')==='미확티'&&!m.resultStatus).length,
    delay:list.filter(m=>m.confirmStatus==='만남밀림'||m.confirmStatus==='만남연기').length,
    afterDp:list.filter(m=>m.resultStatus==='만남후탈락').length,
    beforeDp:list.filter(m=>m.resultStatus==='탈락전'||m.confirmStatus==='만남전탈락').length,
  };
}

function fmtDateKo(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T00:00:00');
  const days=['일','월','화','수','목','금','토'];
  return`${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function fmtDateShort(dateStr){
  if(!dateStr)return'시간미정';
  const d=new Date(dateStr+'T00:00:00');
  const days=['일','월','화','수','목','금','토'];
  return`${d.getMonth()}.${String(d.getDate()).padStart(2,'0')}(${days[d.getDay()]})`;
}

/* ── 생성 ── */
async function generate(){
  const btn=document.getElementById('genBtn');
  btn.innerHTML='<span class="spin"></span> 생성 중...';
  btn.disabled=true;

  const term=document.getElementById('fTerm').value;
  const type=document.getElementById('fType').value;
  const region=document.getElementById('fRegion').value;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const format=document.getElementById('fFormat').value;

  // 필터
  let list=db.meetings.filter(m=>{
    if(term&&m.term!==term)return false;
    if(type&&m.cohort!==type)return false;
    if(region&&m.region!==region)return false;
    if(start&&m.date<start)return false;
    if(end&&m.date>end)return false;
    return true;
  });

  // 날짜 범위 생성
  const dates=[];
  if(start&&end){
    const cur=new Date(start);const endD=new Date(end);
    while(cur<=endD){dates.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  } else {
    const unique=[...new Set(list.map(m=>m.date).filter(Boolean))].sort();
    dates.push(...unique);
  }

  // 헤더 생성
  const todayStr=new Date().toISOString().slice(0,10);
  const todayFmt=todayStr.slice(2).replace(/-/g,'.');
  const regionLabel=region||'전체';
  const termLabel=term?term+'개강':'전체개강';
  const cohortLabel=type||'';

  let txt='';

  if(format==='daily'){
    // 날짜별 일정 양식
    txt+=`⏰${todayFmt} | ${termLabel} ${cohortLabel} #${regionLabel}지역 만남캘린더\n\n`;
    txt+=`-상태 기준표\n`;
    txt+=`🟢확티 🟡전티완료 🔴미확티\n`;
    txt+=`🎉단계 향상 ✔️만남완료(단향X)\n`;
    txt+=`🔺만남 연기 ❌만남 전 탈락 🚫만남 후 탈락\n\n`;
    txt+=`EX)\n`;
    txt+=`🟢시간/개강/단계/섭외방식/섭-인-교\nㄴ다음만남날짜 or 탈락사유\n`;
    txt+=`➖➖➖➖➖➖➖➖➖➖➖\n`;

    dates.forEach(date=>{
      const dl=list.filter(m=>m.date===date);
      const st=countStats(dl);
      txt+=`📅 ${fmtDateKo(date)}\n`;
      txt+=`■ 총만남 ${String(st.total).padStart(2,'0')}건\n`;
      txt+=`🎉${String(st.up).padStart(2,'0')} ✔️${String(st.done).padStart(2,'0')} 🟢${String(st.ok).padStart(2,'0')} 🟡${String(st.pt).padStart(2,'0')}\n`;
      txt+=`🔴${String(st.un).padStart(2,'0')} 🔺${String(st.delay).padStart(2,'0')} 🚫${String(st.afterDp).padStart(2,'0')} ❌${String(st.beforeDp).padStart(2,'0')}\n\n`;

      if(dl.length){
        // 만남목적별 그룹
        const byPurpose={};
        dl.forEach(m=>{
          const p=m.purpose||'기타';
          if(!byPurpose[p])byPurpose[p]=[];
          byPurpose[p].push(m);
        });

        Object.entries(byPurpose).forEach(([purpose,items])=>{
          txt+=`➖${purpose} ${String(items.length).padStart(2,'0')}\n`;
          items.forEach(m=>{
            const emoji=cfEmoji(m);
            const time=m.time||'시간미정';
            const cohort=m.cohort||'청년';
            const stage=m.stage||'';
            const method=m.method||'';
            const people=m.people||'';
            txt+=`${emoji}${time}/${cohort}/${stage}/${method}/${people}\n`;
            // 다음만남 or 탈락사유
            if(m.nextMeeting){
              txt+=`ㄴ${m.nextPurpose||m.purpose||'만남'}, "${fmtDateShort(m.nextMeeting)}"\n`;
            } else if(m.resultStatus&&m.resultStatus.includes('탈락')){
              txt+=`ㄴ${m.resultStatus}\n`;
            }
          });
        });
      } else {
        txt+=`➖\n`;
      }
      txt+=`➖➖➖➖➖➖➖➖➖➖➖\n`;
    });

  } else {
    // 지역 요약 양식
    txt+=`📊 ${termLabel} ${cohortLabel} 만남 현황 요약\n`;
    txt+=`기간: ${start||'전체'} ~ ${end||'전체'}\n\n`;

    const regions=region?[region]:(regionList.length?regionList:[...new Set(list.map(m=>m.region).filter(Boolean))]);
    regions.forEach(r=>{
      const rl=list.filter(m=>m.region===r);
      if(!rl.length)return;
      const st=countStats(rl);
      txt+=`#${r}\n`;
      txt+=`■ 총 ${st.total}건 | 향상 ${st.up} 완료 ${st.done} 미확 ${st.un} 탈락 ${st.afterDp+st.beforeDp}\n\n`;
    });

    const total=countStats(list);
    txt+=`─────────────────\n`;
    txt+=`■ 청년회 합계 ${total.total}건\n`;
    txt+=`🎉${total.up} ✔️${total.done} 🟢${total.ok} 🟡${total.pt} 🔴${total.un} 🔺${total.delay} 🚫${total.afterDp} ❌${total.beforeDp}\n`;
  }

  generatedText=txt;

  // 표시
  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultPre').textContent=txt;
  const label=region?`${regionLabel} ${termLabel}`:termLabel;
  document.getElementById('resultTitle').textContent=`${label} 양식 (${dates.length}일)`;
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});

  btn.textContent='✨ 양식 생성';
  btn.disabled=false;
}

function copyText(){
  navigator.clipboard.writeText(generatedText).then(()=>showToast('📋 복사됐어요!'));
}
function downloadTxt(){
  const blob=new Blob([generatedText],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`만남양식_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  showToast('⬇ 다운로드됐어요!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
</body>
</html>
