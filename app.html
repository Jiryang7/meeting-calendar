<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>만남 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'GangwonEduTt';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/GangwonEduPowerExtraBoldA.woff2') format('woff2');font-weight:700;font-style:normal}
@font-face{font-family:'GangwonEduTt';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/GangwonEduPowerExtraBoldA.woff2') format('woff2');font-weight:400;font-style:normal}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--white:#fff;--bd:#dddcd2;--bd2:#c9c8bc;--s2:#eae9e4;
  --t1:#1a1916;--t2:#6b6960;--t3:#aaa99f;
  --acc:#FAC608;--acc-dk:#c49600;--acc-lt:#fffae8;
  --ok:#15803d;--ok-bg:#dcfce7;--ok-bd:#86efac;
  --warn:#d97706;--warn-bg:#fef9c3;--warn-bd:#fde047;
  --dp:#dc2626;--dp-bg:#fee2e2;--dp-bd:#fca5a5;
  --up-bg:#fef3c7;--up:#92400e;
  --ch:#0ea5e9;--h:#8b5cf6;--d1:#f59e0b;--d2:#f97316;--b:#10b981;--ct:#6366f1;
}
html,body{height:100%;overflow:hidden}
body{font-family:'GangwonEduTt','Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;font-size:14px}

/* ── HEADER ── */
.hdr{height:50px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;position:relative;z-index:100}
.hdr-logo{font-size:16px;font-weight:700;letter-spacing:-.02em;flex:1}
.hdr-btn{background:none;border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--t2);cursor:pointer;font-family:'GangwonEduTt',sans-serif;transition:all .13s}
.hdr-btn:hover{border-color:var(--acc);background:var(--acc-lt)}
.hdr-acc{background:var(--acc);color:#1a1400;border-color:var(--acc);font-weight:700}
.hdr-acc:hover{background:var(--acc-dk)}

/* ── FILTER BAR ── */
.filter-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.dd-wrap{position:relative}
.dd-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);font-size:12px;color:var(--t1);background:var(--white);cursor:pointer;font-family:'GangwonEduTt',sans-serif;transition:all .13s;white-space:nowrap}
.dd-btn.active{background:var(--acc);color:#1a1400;border-color:var(--acc);font-weight:700}
.dd-btn:hover:not(.active){background:var(--s2)}
.dd-arrow{font-size:9px;opacity:.6}
.dd-panel{position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1px solid var(--bd);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200;min-width:130px;overflow:hidden;display:none}
.dd-panel.open{display:block}
.dd-opt{padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.dd-opt:hover{background:var(--s2)}
.dd-opt.sel{font-weight:700;color:var(--acc-dk)}
.dd-opt.sel::after{content:'✓';margin-left:auto;color:var(--acc-dk)}
.dd-sep-line{height:1px;background:var(--bd);margin:2px 0}

/* ── TAB BAR ── */
.tab-bar{background:var(--white);border-bottom:1px solid var(--bd);display:flex;flex-shrink:0}
.tab-btn{flex:1;padding:10px 0;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--t3);font-family:'GangwonEduTt',sans-serif;border-bottom:2px solid transparent;transition:all .13s}
.tab-btn.active{color:var(--t1);border-bottom-color:var(--acc)}

/* ── SCROLL CONTENT ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--bd);background:var(--white)}
.stat{padding:10px 4px;text-align:center;border-right:1px solid var(--bd)}
.stat:last-child{border-right:none}
.stat-v{font-size:22px;font-weight:700;line-height:1.1;display:block}
.stat-v.red{color:var(--dp)}
.stat-v.green{color:var(--ok)}
.stat-v.yellow{color:var(--warn)}
.stat-l{font-size:9px;color:var(--t3);margin-top:2px;display:block}

/* ── STAGE SECTION ── */
.stage-sec{border-bottom:1px solid var(--bd)}
.stage-hdr{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--s2);border-bottom:1px solid var(--bd)}
.stage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stage-nm{font-size:11px;font-weight:700;color:var(--t2)}
.stage-cnt{font-size:10px;color:var(--t3);background:var(--white);border-radius:6px;padding:1px 6px;margin-left:auto;border:1px solid var(--bd);font-family:'DM Mono',monospace}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:1fr 1fr}
.mc{padding:8px 12px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .1s;min-width:0}
.mc:nth-child(2n){border-right:none}
.mc:last-child:nth-child(odd){grid-column:span 2;border-right:none}
.mc:hover{background:var(--s2)}
.mc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-sub{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px;gap:4px}
.mc-region{font-size:9px;color:var(--t3)}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;white-space:nowrap;border:1px solid;font-weight:700;flex-shrink:0;cursor:pointer;transition:all .13s}
.b-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd)}
.b-un{background:var(--dp-bg);color:var(--dp);border-color:var(--dp-bd)}
.b-pt{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd)}
.b-up{background:var(--up-bg);color:var(--up);border-color:var(--warn-bd)}
.b-fb{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}

/* ── DAY HEADER ── */
.day-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--white);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.day-pill{font-size:13px;font-weight:700}
.today-badge{font-size:10px;background:var(--acc);color:#1a1400;border-radius:4px;padding:2px 6px;font-weight:700}
.day-cnt{font-size:11px;color:var(--t3);margin-left:auto;font-family:'DM Mono',monospace}

/* ── 현황 탭 ── */
.section-hdr{padding:12px 14px 6px;font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.week-card{background:var(--white);border-radius:10px;margin:8px 14px;border:1px solid var(--bd);overflow:hidden}
.week-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd);gap:8px}
.week-row:last-child{border-bottom:none}
.week-date{font-size:12px;color:var(--t2);width:50px;flex-shrink:0}
.week-bars{flex:1;display:flex;gap:3px;align-items:center}
.week-bar{height:6px;border-radius:3px;min-width:3px;flex-shrink:0}
.week-stats{display:flex;gap:6px;font-size:10px;font-family:'DM Mono',monospace}
.w-ok{color:var(--ok)}.w-dp{color:var(--dp)}.w-un{color:var(--t3)}

.region-card{background:var(--white);border-radius:10px;margin:0 14px 8px;border:1px solid var(--bd);overflow:hidden}
.region-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bd);gap:8px}
.region-row:last-child{border-bottom:none}
.region-nm{font-size:13px;font-weight:700;width:48px;flex-shrink:0}
.region-bar-wrap{flex:1;height:8px;background:var(--s2);border-radius:4px;overflow:hidden}
.region-bar-fill{height:100%;background:var(--acc);border-radius:4px;transition:width .3s}
.region-nums{font-size:10px;font-family:'DM Mono',monospace;color:var(--t2);width:60px;text-align:right;flex-shrink:0}

/* ── EMPTY ── */
.empty{padding:50px 20px;text-align:center;color:var(--t3)}
.empty-icon{font-size:36px;margin-bottom:10px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3)}
.modal-row{margin-bottom:12px}
.modal-label{font-size:11px;font-weight:700;color:var(--t3);margin-bottom:4px;letter-spacing:.05em}
.modal-val{font-size:14px;color:var(--t1)}
.cf-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.cf-opt{padding:7px 14px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;font-family:'GangwonEduTt',sans-serif;transition:all .13s}
.cf-opt.sel{font-weight:700}
.result-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--t1);color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

/* ── SPIN ── */
.spin{width:12px;height:12px;border:2px solid rgba(26,20,0,.2);border-top-color:var(--t1);border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <span class="hdr-logo">• 만남 캘린더</span>
  <a href="app.html" class="hdr-btn hdr-acc" style="text-decoration:none;font-size:11px">📅 만캘</a>
  <a href="livedata.html" class="hdr-btn" style="text-decoration:none;font-size:11px">📊 보유</a>
  <a href="report.html" class="hdr-btn" style="text-decoration:none;font-size:11px">📄 보고</a>
  <button class="hdr-btn" onclick="loadData()" id="refreshBtn">↺</button>
  <button class="hdr-btn" onclick="doLogout()">나가기</button>
  <button class="hdr-btn hdr-acc" onclick="openAddModal()">+ 추가</button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="dd-wrap">
    <button class="dd-btn" id="dd-term" onclick="toggleDD('term')">
      전체 <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="ddp-term">
      <div class="dd-opt sel" onclick="setTerm('전체',this)">전체 개강</div>
      <div class="dd-opt" onclick="setTerm('4월',this)">4월개강</div>
      <div class="dd-opt" onclick="setTerm('5월',this)">5월개강</div>
    </div>
  </div>
  <div class="dd-wrap">
    <button class="dd-btn" id="dd-type" onclick="toggleDD('type')">
      청년+협교 <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="ddp-type">
      <div class="dd-opt sel" onclick="setType('전체',this)">전체</div>
      <div class="dd-opt" onclick="setType('청년',this)">청년</div>
      <div class="dd-opt" onclick="setType('협력교회',this)">협력교회</div>
    </div>
  </div>
  <div class="dd-wrap">
    <button class="dd-btn" id="dd-region" onclick="toggleDD('region')">
      전체 지역 <span class="dd-arrow">▾</span>
    </button>
    <div class="dd-panel" id="ddp-region" style="min-width:150px">
      <div class="dd-opt" id="rgopt-all" onclick="setRegionAll(this)">✓ 전체 지역</div>
      <div class="dd-sep-line"></div>
      <div id="region-opts"></div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="setTab('today',this)">📅 오늘</button>
  <button class="tab-btn" onclick="setTab('tomorrow',this)">🔔 내일</button>
  <button class="tab-btn" onclick="setTab('stats',this)">📊 현황</button>
</div>

<!-- CONTENT -->
<div class="scroll-area" onclick="closeAllDD()">

  <!-- 오늘 탭 -->
  <div class="tab-content active" id="tab-today">
    <div class="stats-row" id="stats-today"></div>
    <div id="region-stage-today"></div>
    <div id="list-today"></div>
  </div>

  <!-- 내일 탭 -->
  <div class="tab-content" id="tab-tomorrow">
    <div class="stats-row" id="stats-tomorrow"></div>
    <div id="list-tomorrow"></div>
  </div>

  <!-- 현황 탭 -->
  <div class="tab-content" id="tab-stats">
    <div id="content-stats"></div>
  </div>

</div>

<!-- 상태 변경 모달 -->
<div class="overlay" id="statusModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-name">-</div>
    <div class="modal-row">
      <div class="modal-label">단계 · 만남목적</div>
      <div class="modal-val" id="modal-info">-</div>
    </div>
    <div class="modal-row">
      <div class="modal-label">확티 상태</div>
      <div class="cf-opts">
        <div class="cf-opt b-un" onclick="setCF('미확티',this)">❓ 미확티</div>
        <div class="cf-opt b-pt" onclick="setCF('전티완료',this)">📋 전티완료</div>
        <div class="cf-opt b-ok" onclick="setCF('확티',this)">✅ 확티</div>
        <div class="cf-opt" style="background:#f3f4f6;color:#374151;border-color:#d1d5db" onclick="setCF('만남전탈락',this)">🚫 만남전탈락</div>
        <div class="cf-opt" style="background:#f3f4f6;color:#374151;border-color:#d1d5db" onclick="setCF('만남밀림',this)">⏰ 만남밀림</div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">만남 결과</div>
      <div class="result-opts">
        <div class="cf-opt b-up" onclick="setResult('단계향상',this)">🎉 단계향상</div>
        <div class="cf-opt b-ok" onclick="setResult('만남유지',this)">💚 만남유지</div>
        <div class="cf-opt b-un" onclick="setResult('만남후탈락',this)">❌ 만남후탈락</div>
        <div class="cf-opt b-pt" onclick="setResult('탈락전',this)">⚠️ 탈락전</div>
        <div class="cf-opt" style="background:none;border-color:var(--bd);color:var(--t2)" onclick="setResult('',this)">✕ 없음</div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">피드백</div>
      <div class="cf-opts">
        <div class="cf-opt" style="background:#ede9fe;color:#6d28d9;border-color:#c4b5fd" onclick="setFB('done',this)">✅ 완료</div>
        <div class="cf-opt b-pt" onclick="setFB('plan',this)">📝 예정</div>
        <div class="cf-opt" style="background:none;border-color:var(--bd);color:var(--t2)" onclick="setFB('',this)">✕ 없음</div>
      </div>
    </div>
    <button onclick="saveModal()" style="width:100%;background:var(--acc);color:#1a1400;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'GangwonEduTt',sans-serif">저장</button>
  </div>
</div>

<!-- 만남 추가 모달 -->
<div class="overlay" id="addModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <div class="modal-title">만남 추가</div>
    <textarea id="txtInput" rows="5" style="width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:12px;font-family:monospace;resize:none;outline:none" placeholder="개강/단계/섭외방식/섭-인-교/최근만남일/만남목적/만남결과/다음만남일/만남시간/다음만남목적/확티"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <select id="addCohort" style="flex:1;padding:8px;border:1px solid var(--bd);border-radius:7px;font-size:12px;font-family:'GangwonEduTt',sans-serif;background:var(--bg)">
        <option value="">개강 선택</option>
      </select>
      <select id="addRegion" style="flex:1;padding:8px;border:1px solid var(--bd);border-radius:7px;font-size:12px;font-family:'GangwonEduTt',sans-serif;background:var(--bg)">
        <option value="">지역 선택</option>
      </select>
    </div>
    <button onclick="doAdd()" style="width:100%;background:var(--acc);color:#1a1400;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;font-family:'GangwonEduTt',sans-serif">추가</button>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
/* ── CONFIG ── */
const SB_URL='https://tduhoyzgbkwhrvfadsww.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdWhveXpnYmt3aHJ2ZmFkc3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjI3NjMsImV4cCI6MjA5MjQ5ODc2M30.yoAiBzAJCHnp_gtWzO2WooeIlVh8xRnpCmBZETrX-wg';
const SB_ID='00000000-0000-0000-0000-000000000001';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const STAGE_COLORS={CH:'#0ea5e9',H:'#8b5cf6',D1:'#f59e0b',D2:'#f97316',B:'#10b981',CT:'#6366f1'};
const STAGE_LABELS={CH:'찾기',H:'합자',D1:'육따',D2:'영따',B:'복',CT:'센확'};
const STAGE_ORDER=['CH','H','D1','D2','B','CT'];

/* ── STATE ── */
let db={meetings:[]};
let purposeMap={},stageOrder=[],regionList=[],cohortList=[];
let curTab='today';
let filterTerm='전체',filterType='전체',filterRegions=[];
let modalIdx=null,modalCF='',modalResult='',modalFB='';

/* ── AUTH ── */
function getSession(){try{return JSON.parse(localStorage.getItem('mtg-user'));}catch{return null;}}
function doLogout(){localStorage.removeItem('mtg-user');localStorage.removeItem('mtg-enc-key');window.location.href='index.html';}
if(!getSession()){window.location.href='index.html';}

/* ── DATE ── */
function today(){return new Date().toISOString().slice(0,10);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(d){const r=new Date(d+'T00:00:00');const days=['일','월','화','수','목','금','토'];return`${r.getMonth()+1}/${r.getDate()} ${days[r.getDay()]}요일`;}

/* ── LOAD / SAVE ── */
async function loadData(){
  document.getElementById('refreshBtn').innerHTML='<span class="spin"></span>';
  try{
    const cache=localStorage.getItem('mtg-cache');
    if(cache){const s=JSON.parse(cache);db=s.db||{meetings:[]};purposeMap=s.purposeMap||{};stageOrder=s.stageOrder||[];regionList=s.regionList||[];cohortList=s.cohortList||[];}
    render();
    const resp=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${SB_ID}&select=data`,{headers:SB_HDR});
    const rows=await resp.json();
    if(rows&&rows[0]&&rows[0].data){
      const raw=rows[0].data;
      db=raw.db||{meetings:[]};
      purposeMap=raw.purposeMap||{};
      stageOrder=raw.stageOrder||[];
      regionList=raw.regionList||raw.regionList||[];
      cohortList=raw.cohortList||[];
      localStorage.setItem('mtg-cache',JSON.stringify({db,purposeMap,stageOrder,regionList,cohortList}));
      render();
    }
  }catch(e){showToast('로드 오류');}
  document.getElementById('refreshBtn').textContent='↺';
}

async function save(){
  const payload={db,purposeMap,stageOrder,regionList,cohortList};
  localStorage.setItem('mtg-cache',JSON.stringify(payload));
  try{
    await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${SB_ID}`,{
      method:'PATCH',headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({data:payload})
    });
  }catch(e){showToast('저장 오류');}
}

/* ── FILTER ── */
function getFiltered(){
  return db.meetings.filter(m=>{
    if(filterTerm!=='전체'&&m.term!==filterTerm)return false;
    if(filterType!=='전체'&&m.cohort!==filterType)return false;
    if(filterRegions.length&&!filterRegions.includes(m.region))return false;
    return true;
  });
}

function getFilteredByDate(dateStr){
  return getFiltered().filter(m=>m.date===dateStr);
}

/* ── TAB ── */
function setTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

/* ── DROPDOWN ── */
function toggleDD(name){
  const panel=document.getElementById('ddp-'+name);
  const isOpen=panel.classList.contains('open');
  closeAllDD();
  if(!isOpen)panel.classList.add('open');
}
function closeAllDD(){
  document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open'));
}
function setTerm(val,el){
  filterTerm=val;
  document.getElementById('dd-term').innerHTML=(val==='전체'?'전체':'<b>'+val+'개강</b>')+' <span class="dd-arrow">▾</span>';
  document.getElementById('dd-term').classList.toggle('active',val!=='전체');
  document.querySelectorAll('#ddp-term .dd-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  closeAllDD();render();
}
function setType(val,el){
  filterType=val;
  document.getElementById('dd-type').innerHTML=(val==='전체'?'청년+협교':'<b>'+val+'</b>')+' <span class="dd-arrow">▾</span>';
  document.getElementById('dd-type').classList.toggle('active',val!=='전체');
  document.querySelectorAll('#ddp-type .dd-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  closeAllDD();render();
}
function setRegionAll(el){
  filterRegions=[];
  document.getElementById('dd-region').innerHTML='전체 지역 <span class="dd-arrow">▾</span>';
  document.getElementById('dd-region').classList.remove('active');
  document.querySelectorAll('#region-opts .dd-opt').forEach(o=>o.classList.remove('sel'));
  el.textContent='✓ 전체 지역';
  closeAllDD();render();
}
function toggleRegion(val,el){
  if(filterRegions.includes(val)){filterRegions=filterRegions.filter(r=>r!==val);el.classList.remove('sel');}
  else{filterRegions.push(val);el.classList.add('sel');}
  document.getElementById('rgopt-all').textContent=filterRegions.length?'전체 지역':'✓ 전체 지역';
  const label=filterRegions.length===0?'전체 지역':filterRegions.length===1?filterRegions[0]:`${filterRegions[0]} 외 ${filterRegions.length-1}`;
  document.getElementById('dd-region').innerHTML=`<b>${label}</b> <span class="dd-arrow">▾</span>`;
  document.getElementById('dd-region').classList.toggle('active',filterRegions.length>0);
  render();
}
function buildRegionOpts(){
  const wrap=document.getElementById('region-opts');
  wrap.innerHTML=regionList.map(r=>`<div class="dd-opt" onclick="toggleRegion('${r}',this)">${r}</div>`).join('');
}

/* ── STAGE CODE ── */
function stageCode(s){
  if(!s)return'기타';
  const u=s.toString().toUpperCase();
  for(const c of STAGE_ORDER){if(u.includes(c))return c;}
  return s;
}

/* ── RENDER ── */
function render(){
  buildRegionOpts();
  buildAddSelects();
  if(curTab==='today')renderDayTab('today',today());
  else if(curTab==='tomorrow')renderDayTab('tomorrow',addDays(1));
  else renderStats();
}

function renderDayTab(tabId,dateStr){
  const list=getFilteredByDate(dateStr);
  const todayFlag=tabId==='today';

  // stats
  const total=list.length;
  const unCf=list.filter(m=>(m.confirmStatus||'미확티')==='미확티').length;
  const okCf=list.filter(m=>m.confirmStatus==='확티').length;
  const up=list.filter(m=>m.resultStatus==='단계향상').length;
  const fbDone=list.filter(m=>m.feedback==='done').length;

  document.getElementById('stats-'+tabId).innerHTML=`
    <div class="stat"><span class="stat-v">${total}</span><span class="stat-l">${todayFlag?'오늘':'내일'} 만남</span></div>
    <div class="stat"><span class="stat-v red">${unCf}</span><span class="stat-l">미확티</span></div>
    <div class="stat"><span class="stat-v green">${todayFlag?up:okCf}</span><span class="stat-l">${todayFlag?'단계향상':'확티'}</span></div>
    <div class="stat"><span class="stat-v yellow">${todayFlag?okCf:fbDone}</span><span class="stat-l">${todayFlag?'확티':'피드백완료'}</span></div>
  `;

  // 오늘 탭에만 지역별 단계 표 표시
  if(todayFlag){
    const rsEl=document.getElementById('region-stage-today');
    if(rsEl&&list.length){
      const regions=[...new Set(list.map(m=>m.region).filter(Boolean))];
      // regionList 순서 기준
      const orderedR=regionList.length?regionList.filter(r=>regions.includes(r)).concat(regions.filter(r=>!regionList.includes(r))):regions;
      const stages=['CH','H','D1','D2','B','CT'];
      const stageColors={CH:'#0ea5e9',H:'#8b5cf6',D1:'#f59e0b',D2:'#f97316',B:'#10b981',CT:'#6366f1'};
      let tableHtml=`<div style="overflow-x:auto;background:var(--white);border-bottom:1px solid var(--bd)">
        <table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono',monospace">
          <thead>
            <tr style="background:var(--s2)">
              <th style="padding:5px 10px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bd);white-space:nowrap">지역</th>
              ${stages.map(s=>`<th style="padding:5px 8px;text-align:center;font-size:10px;color:${stageColors[s]};border-bottom:1px solid var(--bd)">${s}</th>`).join('')}
              <th style="padding:5px 8px;text-align:center;font-size:10px;color:var(--t2);border-bottom:1px solid var(--bd)">합계</th>
            </tr>
          </thead>
          <tbody>`;
      const totals={};stages.forEach(s=>totals[s]=0);let grandTotal=0;
      orderedR.forEach(r=>{
        const rl=list.filter(m=>m.region===r);
        const cnt={};stages.forEach(s=>cnt[s]=0);
        rl.forEach(m=>{const c=stageCode(m.stage);if(cnt[c]!==undefined)cnt[c]++;});
        stages.forEach(s=>totals[s]+=cnt[s]);grandTotal+=rl.length;
        tableHtml+=`<tr style="border-bottom:1px solid var(--bd)">
          <td style="padding:5px 10px;font-weight:700;font-family:'GangwonEduTt',sans-serif;white-space:nowrap;font-size:11px">${r}</td>
          ${stages.map(s=>`<td style="padding:5px 8px;text-align:center;color:${cnt[s]?stageColors[s]:'var(--t3)'};">${cnt[s]||'—'}</td>`).join('')}
          <td style="padding:5px 8px;text-align:center;font-weight:700;color:var(--t2)">${rl.length}</td>
        </tr>`;
      });
      // 합계 행
      tableHtml+=`<tr style="background:var(--acc-lt)">
        <td style="padding:5px 10px;font-weight:700;font-family:'GangwonEduTt',sans-serif;font-size:11px">합계</td>
        ${stages.map(s=>`<td style="padding:5px 8px;text-align:center;font-weight:700;color:${stageColors[s]}">${totals[s]||'—'}</td>`).join('')}
        <td style="padding:5px 8px;text-align:center;font-weight:700;color:var(--acc-dk)">${grandTotal}</td>
      </tr>`;
      tableHtml+=`</tbody></table></div>`;
      rsEl.innerHTML=tableHtml;
    } else if(rsEl){rsEl.innerHTML='';}
  }

  if(!list.length){
    document.getElementById('list-'+tabId).innerHTML=`<div class="empty"><div class="empty-icon">${todayFlag?'☀️':'🔔'}</div><p>${todayFlag?'오늘 예정된 만남이 없어요':'내일 예정된 만남이 없어요'}</p></div>`;
    return;
  }

  // 단계별 그룹
  const byStage={};
  STAGE_ORDER.forEach(s=>byStage[s]=[]);
  byStage['기타']=[];
  list.forEach(m=>{const c=stageCode(m.stage);(byStage[c]||byStage['기타']).push(m);});

  let html=`<div class="day-hdr"><span class="day-pill">${fmtDate(dateStr)}</span>${todayFlag?'<span class="today-badge">오늘</span>':''}<span class="day-cnt">${total}건</span></div>`;

  STAGE_ORDER.forEach(stage=>{
    const items=byStage[stage];
    if(!items.length)return;
    const color=STAGE_COLORS[stage]||'#999';
    const label=STAGE_LABELS[stage]||stage;
    html+=`<div class="stage-sec">
      <div class="stage-hdr">
        <div class="stage-dot" style="background:${color}"></div>
        <span class="stage-nm">${stage} · ${label}</span>
        <span class="stage-cnt">${items.length}명</span>
      </div>
      <div class="card-grid">`;

    items.forEach(m=>{
      const idx=db.meetings.indexOf(m);
      const cf=m.confirmStatus||'미확티';
      const res=m.resultStatus||'';
      const fb=m.feedback||'';
      let badgeHtml='';
      if(res==='단계향상')badgeHtml=`<span class="badge b-up">🎉향상</span>`;
      else if(res==='만남유지')badgeHtml=`<span class="badge b-ok">💚유지</span>`;
      else if(res&&res.includes('탈락'))badgeHtml=`<span class="badge b-un">❌탈락</span>`;
      else if(cf==='확티')badgeHtml=`<span class="badge b-ok">✅확티</span>`;
      else if(cf==='전티완료')badgeHtml=`<span class="badge b-pt">📋전티</span>`;
      else if(cf==='만남전탈락')badgeHtml=`<span class="badge b-un">🚫탈락</span>`;
      else if(cf==='만남밀림')badgeHtml=`<span class="badge b-pt">⏰밀림</span>`;
      else badgeHtml=`<span class="badge b-un">❓미확티</span>`;

      const fbBadge=!todayFlag&&fb?`<span class="badge b-fb" style="font-size:9px">${fb==='done'?'✅':'📝'}</span>`:'';

      html+=`<div class="mc" onclick="openModal(${idx})">
        <div class="mc-name">${(m.people||'').split('-')[0]||m.people}</div>
        <div class="mc-sub">${m.purpose||''}</div>
        <div class="mc-foot"><span class="mc-region">${m.region||''}</span><div style="display:flex;gap:3px">${fbBadge}${badgeHtml}</div></div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  document.getElementById('list-'+tabId).innerHTML=html;
}

function renderStats(){
  const list=getFiltered();
  if(!list.length){
    document.getElementById('content-stats').innerHTML=`<div class="empty"><div class="empty-icon">📊</div><p>데이터가 없어요</p></div>`;
    return;
  }

  const tod=today();
  // 이번주 7일
  const weekDays=[];
  for(let i=-3;i<=3;i++){const d=new Date();d.setDate(d.getDate()+i);weekDays.push(d.toISOString().slice(0,10));}

  let html=`<div class="section-hdr">이번 주 만남 현황</div>`;
  html+=`<div class="week-card">`;
  weekDays.forEach(d=>{
    const dl=list.filter(m=>m.date===d);
    if(!dl.length)return;
    const ok=dl.filter(m=>m.resultStatus==='단계향상'||m.resultStatus==='만남유지').length;
    const dp=dl.filter(m=>m.resultStatus&&m.resultStatus.includes('탈락')).length;
    const un=dl.length-ok-dp;
    const isToday=d===tod;
    html+=`<div class="week-row" style="${isToday?'background:var(--acc-lt)':''}">
      <span class="week-date" style="${isToday?'font-weight:700':''}">${fmtDate(d).slice(0,4)}</span>
      <div class="week-bars">
        ${ok?`<div class="week-bar" style="background:var(--ok);width:${ok*12}px"></div>`:''}
        ${dp?`<div class="week-bar" style="background:var(--dp);width:${dp*12}px"></div>`:''}
        ${un?`<div class="week-bar" style="background:var(--bd2);width:${un*8}px"></div>`:''}
      </div>
      <div class="week-stats"><span class="w-ok">${ok}↑</span><span class="w-dp">${dp}✕</span><span class="w-un">${un}-</span></div>
    </div>`;
  });
  html+=`</div>`;

  // 지역별 현황
  html+=`<div class="section-hdr">지역별 현황</div><div class="region-card">`;
  const regions=regionList.length?regionList:[...new Set(list.map(m=>m.region).filter(Boolean))];
  const maxTotal=Math.max(...regions.map(r=>list.filter(m=>m.region===r).length),1);
  regions.forEach(r=>{
    const rl=list.filter(m=>m.region===r);
    if(!rl.length)return;
    const ok=rl.filter(m=>m.resultStatus==='단계향상'||m.resultStatus==='만남유지').length;
    const pre=rl.filter(m=>!m.resultStatus||m.resultStatus==='').length;
    const pct=Math.round(rl.length/maxTotal*100);
    html+=`<div class="region-row">
      <span class="region-nm">${r}</span>
      <div class="region-bar-wrap"><div class="region-bar-fill" style="width:${pct}%"></div></div>
      <span class="region-nums">${ok}성/${rl.length}건</span>
    </div>`;
  });
  html+=`</div><div style="height:20px"></div>`;

  document.getElementById('content-stats').innerHTML=html;
}

/* ── MODAL ── */
function openModal(idx){
  const m=db.meetings[idx];
  if(!m)return;
  modalIdx=idx;
  modalCF=m.confirmStatus||'미확티';
  modalResult=m.resultStatus||'';
  modalFB=m.feedback||'';

  document.getElementById('modal-name').textContent=(m.people||'').split('-')[0]||m.people;
  document.getElementById('modal-info').textContent=`${m.stage||''} · ${m.purpose||''} · ${m.region||''}`;

  // 확티 선택 표시
  document.querySelectorAll('.cf-opts .cf-opt').forEach(o=>{
    o.style.fontWeight=o.textContent.includes(modalCF)?'700':'400';
    o.style.opacity=o.textContent.includes(modalCF)?'1':'.6';
  });
  document.querySelectorAll('.result-opts .cf-opt').forEach(o=>{
    const val=o.onclick?.toString().match(/'([^']+)'/)?.[1]||'';
    o.style.fontWeight=val===modalResult?'700':'400';
    o.style.opacity=val===modalResult?'1':'.6';
  });

  document.getElementById('statusModal').classList.add('open');
}
function closeModal(){document.getElementById('statusModal').classList.remove('open');modalIdx=null;}
function setCF(val,el){
  modalCF=val;
  document.querySelectorAll('.cf-opts .cf-opt').forEach(o=>{o.style.fontWeight='400';o.style.opacity='.6';});
  el.style.fontWeight='700';el.style.opacity='1';
}
function setResult(val,el){
  modalResult=val;
  document.querySelectorAll('.result-opts .cf-opt').forEach(o=>{o.style.fontWeight='400';o.style.opacity='.6';});
  el.style.fontWeight='700';el.style.opacity='1';
}
function setFB(val,el){
  modalFB=val;
  document.querySelectorAll('#statusModal .modal-row:last-of-type .cf-opt').forEach(o=>{o.style.fontWeight='400';o.style.opacity='.6';});
  el.style.fontWeight='700';el.style.opacity='1';
}
async function saveModal(){
  if(modalIdx===null)return;
  const m=db.meetings[modalIdx];
  m.confirmStatus=modalCF;
  m.resultStatus=modalResult;
  m.feedback=modalFB;
  closeModal();
  await save();
  render();
  showToast('✓ 저장됨');
}

/* ── ADD MODAL ── */
function buildAddSelects(){
  const ch=document.getElementById('addCohort');
  const rg=document.getElementById('addRegion');
  if(ch){ch.innerHTML='<option value="">개강 선택</option>'+cohortList.map(c=>`<option value="${c}">${c}</option>`).join('');}
  if(rg){rg.innerHTML='<option value="">지역 선택</option>'+regionList.map(r=>`<option value="${r}">${r}</option>`).join('');}
}
function openAddModal(){document.getElementById('addModal').classList.add('open');}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}
function doAdd(){
  const txt=document.getElementById('txtInput').value.trim();
  const cohort=document.getElementById('addCohort').value;
  const region=document.getElementById('addRegion').value;
  if(!txt)return;
  txt.split('\n').forEach(line=>{
    line=line.trim();if(!line)return;
    const p=line.split('/');
    const m={
      cohort:cohort||p[0]||'',stage:p[1]||'',method:p[2]||'',people:p[3]||'',
      date:parseDate(p[4]||''),purpose:p[5]||'',resultStatus:mapResult(p[6]||''),
      nextMeeting:parseDate(p[7]||''),time:p[8]||'',nextPurpose:p[9]||'',
      confirmStatus:mapConfirm(p[10]||''),region:region||'',
      addedAt:new Date().toISOString(),updatedAt:new Date().toISOString(),history:[]
    };
    if(m.date&&m.people)db.meetings.push(m);
  });
  document.getElementById('txtInput').value='';
  closeAddModal();
  save();render();
  showToast('✓ 추가됨');
}

function parseDate(raw){
  if(!raw)return null;
  raw=raw.toString().trim().replace(/[()월금토일화수목]/g,'');
  const m=raw.match(/^(\d{1,2})[.\-\/](\d{1,2})/);
  if(m){const y=new Date().getFullYear();return`${y}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`;}
  return null;
}
function mapResult(r){
  if(!r||r==='만남결과')return'';
  if(r.includes('향상'))return'단계향상';
  if(r.includes('유지'))return'만남유지';
  if(r.includes('후탈락')||r.includes('탈락후'))return'만남후탈락';
  if(r.includes('전탈락')||r.includes('탈락전'))return'탈락전';
  return r;
}
function mapConfirm(c){
  if(!c||c==='확티체크'||c==='미확티')return'미확티';
  if(c.includes('전티'))return'전티완료';
  if(c.includes('확티'))return'확티';
  if(c.includes('만남전탈락'))return'만남전탈락';
  if(c.includes('만남밀림'))return'만남밀림';
  return c;
}

/* ── TOAST ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* ── INIT ── */
loadData();
</script>
