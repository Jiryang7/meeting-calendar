<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만남 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
@font-face{font-family:'GangwonEduTt';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEdu_OTFBoldA.woff') format('woff');font-weight:700;font-style:normal}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--white:#fff;--s2:#edece7;--s3:#e3e2db;
  --bd:#dddcd2;--bd2:#c9c8bc;
  --t1:#1a1916;--t2:#6b6960;--t3:#aaa99f;
  --acc:#FAC608;--acc-dk:#c49600;--acc-lt:#fffae8;--acc-md:#fde068;--acc-tx:#7a5d00;
  --cf-un:#9ca3af;--cf-un-bg:#f9fafb;--cf-un-bd:#e5e7eb;
  --cf-pt:#b45309;--cf-pt-bg:#fffbeb;--cf-pt-bd:#fcd34d;
  --cf-ok:#15803d;--cf-ok-bg:#f0fdf4;--cf-ok-bd:#86efac;
  --r-up:#15803d;--r-up-bg:#dcfce7;--r-up-bd:#86efac;
  --r-ke:#1d4ed8;--r-ke-bg:#dbeafe;--r-ke-bd:#93c5fd;
  --r-on:#7c3aed;--r-on-bg:#ede9fe;--r-on-bd:#c4b5fd;
  --r-dl:#ea580c;--r-dl-bg:#fff7ed;--r-dl-bd:#fed7aa;
  --r-dp:#b91c1c;--r-dp-bg:#fee2e2;--r-dp-bd:#fca5a5;
  --r-da:#374151;--r-da-bg:#f3f4f6;--r-da-bd:#d1d5db;
}
/* inserted */

/* ── SIDEBAR LAYOUT ── */
.app-body{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--bd);background:var(--white);position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;display:flex;flex-direction:column}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column}
.sb-section{padding:10px 12px 4px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border-radius:0;color:var(--t2);transition:all .13s;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--s2);color:var(--t1)}
.sb-item.active{background:var(--acc-lt);color:var(--acc-tx);font-weight:700;border-right:3px solid var(--acc)}
.sb-cnt{font-family:'DM Mono',monospace;font-size:10px;background:var(--s2);color:var(--t3);padding:1px 6px;border-radius:8px}
.sb-item.active .sb-cnt{background:var(--acc-md);color:var(--acc-tx)}
.sb-divider{height:1px;background:var(--bd);margin:8px 12px}
.sb-admin-item{display:flex;align-items:center;gap:7px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .13s;border:none;background:none;width:100%;text-align:left;border-radius:0}
.sb-admin-item:hover{background:var(--s2);color:var(--t1)}
.sb-admin-item.active{background:var(--s2);color:var(--t1);font-weight:700}
.sb-lock{font-size:10px;padding:4px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;cursor:pointer;color:var(--t2);transition:all .13s;margin:6px 12px}
.sb-lock:hover{border-color:var(--acc);color:var(--acc-dk)}
@media(max-width:700px){
  .sidebar{width:52px}
  .sb-item span:first-child,.sb-cnt,.sb-section,.sb-admin-item span{display:none}
  .sb-item{justify-content:center;padding:10px 0}
  .sb-admin-item{justify-content:center;padding:10px 0}
}

body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;font-size:15px}
.stripe{height:3px;background:var(--acc);position:fixed;top:0;left:0;right:0;z-index:300}

/* ── HEADER ── */
.hdr{height:54px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:3px;z-index:200;background:var(--white)}
.hdr-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.03em;flex-shrink:0}
.logo-dot{width:9px;height:9px;background:var(--acc);border-radius:50%}
.vtabs{display:flex;gap:0;background:var(--s2);border-radius:8px;padding:3px;border:1px solid var(--bd);margin-left:10px}
.vtab{padding:4px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:none;border:none;color:var(--t2);transition:all .14s;white-space:nowrap}
.vtab.active{background:var(--acc);color:#1a1400;font-weight:700}
.hdr-r{margin-left:auto;display:flex;gap:7px;align-items:center}

/* ── BTNS ── */
.btn{background:var(--white);border:1px solid var(--bd2);color:var(--t1);border-radius:7px;padding:6px 13px;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s}
.btn:hover{border-color:var(--acc);background:var(--acc-lt)}
.btn-acc{background:var(--acc);color:#1a1400;border-color:transparent;font-weight:700}
.btn-acc:hover{background:var(--acc-dk);color:var(--white)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:none;border-color:var(--bd);color:var(--t2)}
.btn-ghost:hover{background:var(--s2);border-color:var(--bd2);color:var(--t1)}

/* ── REGION TABS ── */
.rtabs{display:flex;align-items:center;gap:3px;padding:0 20px;height:42px;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:100;background:var(--white)}
.rtabs::-webkit-scrollbar{display:none}
.rtab{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--t2);background:none;border:none;transition:all .13s;display:flex;align-items:center;gap:4px}
.rtab:hover{color:var(--t1);background:var(--s2)}
.rtab.active{color:#1a1400;background:var(--acc);font-weight:700}
.rtab-c{font-family:'DM Mono',monospace;font-size:10px;opacity:.65}

/* ── CONTENT ── */
.content{max-width:960px;margin:0 auto;padding:20px 20px 80px}

/* ── SUMBAR ── */
.sumbar{display:none;flex-wrap:wrap;gap:6px;padding:12px 16px;margin-bottom:18px;background:var(--white);border:1px solid var(--bd);border-radius:10px}
.s-chip{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--s2)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sl{color:var(--t2)}.sv{font-family:'DM Mono',monospace;font-weight:700;color:var(--t1)}
.s-total{margin-left:auto;font-size:12px;font-weight:700;padding:4px 12px;background:var(--acc-lt);border:1px solid var(--acc-md);border-radius:20px;color:var(--acc-tx)}

/* ════════ LIST VIEW ════════ */
.dg{margin:24px 0 0}
.dg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 0;position:sticky;top:99px;z-index:8;background:var(--bg)}
.dg-pill{font-family:'DM Mono',monospace;font-size:11px;background:var(--acc);color:#1a1400;border-radius:20px;padding:3px 12px;font-weight:700}
.dg-day{font-size:17px;font-weight:700;letter-spacing:-.02em;font-family:'GangwonEduTt',sans-serif}
.dg-today{font-size:10px;background:var(--t1);color:var(--white);border-radius:4px;padding:2px 7px;font-weight:700}
.dg-cnt{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);background:var(--s2);padding:2px 8px;border-radius:8px;border:1px solid var(--bd)}
.dg-badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}

/* 단계 그룹 */
.sg{margin-bottom:8px;border:1px solid var(--bd);border-radius:11px;overflow:hidden;background:var(--white)}
.sg-hdr{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
.sg-hdr:hover{background:var(--s3)}
.sg-name{font-size:14px;font-weight:700;font-family:'GangwonEduTt',sans-serif}
.sg-purpose{font-size:11px;color:var(--t2);font-weight:400}
.sg-cnt{font-family:'DM Mono',monospace;font-size:10px;background:var(--white);color:var(--t2);padding:2px 7px;border-radius:8px;border:1px solid var(--bd)}
.sg-up{font-size:10px;color:var(--r-up);font-weight:700;background:var(--r-up-bg);padding:2px 7px;border-radius:6px;border:1px solid var(--r-up-bd)}
.sg-pre{font-size:10px;color:var(--cf-ok);font-weight:600;background:var(--cf-ok-bg);padding:2px 7px;border-radius:6px;border:1px solid var(--cf-ok-bd)}
.sg-reg{margin-left:auto;font-size:10px;padding:2px 8px;background:var(--acc-lt);border:1px solid var(--acc-md);color:var(--acc-tx);border-radius:5px;font-weight:600}
.sg-tog{font-size:11px;color:var(--t3)}
.sg-body{}

/* ── MEETING CARD ── */
.mc{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bd);position:relative;overflow:hidden;transition:background .1s}
.mc:last-child{border-bottom:none}
.mc:hover{background:var(--bg)}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
/* 만남 전 */
.pre-un::before{background:var(--cf-un)}.pre-un{background:var(--cf-un-bg)}
.pre-pt::before{background:var(--cf-pt)}.pre-pt{background:var(--cf-pt-bg)}
.pre-ok::before{background:var(--cf-ok)}.pre-ok{background:var(--cf-ok-bg)}
/* 만남 결과 */
.r-up::before{background:var(--r-up)}.r-up{background:var(--r-up-bg)}.r-up:hover{background:#bbf7d0}
.r-ke::before{background:var(--r-ke)}.r-ke{background:var(--r-ke-bg)}
.r-on::before{background:var(--r-on)}.r-on{background:var(--r-on-bg)}
.r-dl::before{background:var(--r-dl)}.r-dl{background:var(--r-dl-bg)}
.r-dp::before{background:var(--r-dp)}.r-dp{background:var(--r-dp-bg)}
.r-da::before{background:var(--r-da)}.r-da{background:var(--r-da-bg)}

.mc-left{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:40px}
.mc-ico{font-size:14px;line-height:1}
.mc-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-align:center;line-height:1.3}

/* confirmStatus badge — prominent when pre-meeting */
.cf-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em}
.cf-un-badge{background:var(--cf-un-bg);color:var(--cf-un);border:1px solid var(--cf-un-bd)}
.cf-pt-badge{background:var(--cf-pt-bg);color:var(--cf-pt);border:1px solid var(--cf-pt-bd)}
.cf-ok-badge{background:var(--cf-ok-bg);color:var(--cf-ok);border:1px solid var(--cf-ok-bd)}

/* 미확티 urgent ring */
.urgent-ring{box-shadow:0 0 0 2px rgba(239,68,68,.35);border-color:#f87171!important}

.mc-body{flex:1;min-width:0}
.mc-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.mc-people{font-size:15px;font-weight:700;flex-shrink:0}
.mc-tags{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.tag{font-size:10px;padding:1px 7px;border-radius:4px;background:var(--s2);color:var(--t2);border:1px solid var(--bd);white-space:nowrap}
.mc-sub{font-size:13px;color:var(--t2);line-height:1.6}
.mc-next{font-size:13px;color:var(--acc-dk);margin-top:3px;font-weight:600}
.mc-next::before{content:'→ ';opacity:.5}
.mc-hist{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:2px}
.upd-ring{outline:2px solid var(--acc);outline-offset:1px;border-radius:11px}

/* ════════ MONTH VIEW ════════ */
.cal-nav{display:flex;align-items:center;padding:0 0 16px}
.cal-nav-title{font-size:20px;font-weight:700;flex:1;text-align:center;letter-spacing:-.03em}
.cnbtn{background:var(--white);border:1px solid var(--bd);color:var(--t1);border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.cnbtn:hover{border-color:var(--acc);background:var(--acc-lt)}

.mon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-family:'DM Mono',monospace;text-align:center;color:var(--t3);padding:6px 0;font-weight:500}
.mon-cell{min-height:98px;border-radius:9px;border:1px solid var(--bd);background:var(--white);padding:7px 7px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px}
.mon-cell:hover:not(.empty):not(.no-mtg){border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-md)}
.mon-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.mon-cell.no-mtg{cursor:default;background:var(--s2)}
.mon-cell.today{border:2px solid var(--acc)}.mon-cell.today .mon-dn{color:var(--acc-dk);font-weight:700}
.mon-cell.selected{border:2px solid var(--t1);box-shadow:0 2px 10px rgba(0,0,0,.1)}
.mon-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.mon-dn{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--t2)}
.mon-total{font-size:10px;font-family:'DM Mono',monospace;background:var(--acc);color:#1a1400;border-radius:9px;padding:1px 7px;font-weight:700}
.mon-stage-row{display:flex;align-items:center;gap:3px;margin-bottom:1px}
.mon-bar{height:5px;border-radius:3px;flex-shrink:0}
.mon-sl{font-size:8px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.mon-sc{font-family:'DM Mono',monospace;font-size:9px;color:var(--t2);font-weight:600;flex-shrink:0}
.mon-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:auto;padding-top:2px}
.mon-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ════════ WEEK VIEW ════════ */
.week-nav{display:flex;align-items:center;padding:0 0 14px}
.week-nav-title{font-size:15px;font-weight:700;flex:1;text-align:center}
.wk-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.wk-col{display:flex;flex-direction:column}
.wk-hdr{border-radius:9px 9px 0 0;background:var(--s2);border:1px solid var(--bd);border-bottom:none;padding:8px 5px;text-align:center;cursor:pointer;transition:all .12s}
.wk-hdr:hover:not(.no-data){background:var(--s3)}
.wk-hdr.today-h{background:var(--acc-lt);border-color:var(--acc-md)}
.wk-hdr.sel-h{background:var(--acc);border-color:var(--acc-dk)}
.wk-hdr.sel-h .wk-dn,.wk-hdr.sel-h .wk-dow{color:#1a1400}
.wk-hdr.no-data{cursor:default;opacity:.5}
.wk-dow{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;display:block}
.wk-dn{font-size:16px;font-weight:700;color:var(--t1);font-family:'DM Mono',monospace;display:block;margin:2px 0}
.wk-cnt{font-size:10px;font-family:'DM Mono',monospace;background:var(--white);color:var(--t2);border-radius:8px;padding:1px 6px;display:inline-block}
.wk-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 9px 9px;background:var(--white);flex:1;padding:6px;min-height:80px;overflow:hidden}
.wk-stage-pill{display:flex;align-items:center;justify-content:space-between;gap:3px;padding:3px 7px;border-radius:7px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;transition:opacity .1s}
.wk-stage-pill:hover{opacity:.8}
.wk-sp-name{font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.wk-sp-cnt{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0}

/* ════════ DAY DETAIL ════════ */
.day-detail{margin-top:12px;border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--white);box-shadow:0 4px 20px rgba(0,0,0,.06);animation:fdIn .18s ease}
@keyframes fdIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.dd-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--acc);flex-wrap:wrap}
.dd-title{font-size:14px;font-weight:700;color:#1a1400}
.dd-badge{font-size:11px;background:var(--white);border-radius:5px;padding:2px 8px;font-weight:700}
.dd-close{margin-left:auto;background:rgba(0,0,0,.08);border:none;color:#1a1400;cursor:pointer;font-size:15px;padding:2px 8px;border-radius:4px;font-weight:700}
.dd-sec-title{padding:8px 14px 4px;font-size:11px;font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--bd);color:var(--t2)}

/* ════════ SETTINGS VIEW ════════ */
.settings-wrap{display:flex;flex-direction:column;gap:20px}
.settings-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.settings-card-hdr{padding:14px 18px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sc-title{font-size:14px;font-weight:700}
.sc-sub{font-size:11px;color:var(--t2)}
.settings-card-body{padding:16px 18px}

/* Purpose mapping table */
.purpose-table{width:100%;border-collapse:collapse;font-size:12px}
.purpose-table th{font-size:10px;font-weight:700;color:var(--t3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--bd);letter-spacing:.06em;text-transform:uppercase}
.purpose-table td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.purpose-table tr:last-child td{border-bottom:none}
.purpose-table tr:hover td{background:var(--bg)}
.pt-original{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);font-weight:500}
.pt-cnt{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);text-align:right}
.pt-arrow{color:var(--t3);text-align:center;font-size:14px}
.pt-input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:5px 9px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--t1);outline:none;transition:border-color .13s}
.pt-input:focus{border-color:var(--acc);background:var(--acc-lt)}
.no-purposes{padding:30px;text-align:center;color:var(--t3);font-size:13px}

/* new alias input */
.alias-input-row{display:flex;gap:8px;align-items:center}
.alias-input-row input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:7px 11px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--t1);outline:none}
.alias-input-row input:focus{border-color:var(--acc)}

/* ════════ MODAL ════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.overlay.hidden{display:none}
.modal{background:var(--white);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:20px 22px 30px;width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;gap:13px;box-shadow:0 -4px 40px rgba(0,0,0,.1)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal textarea{background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-family:'Noto Sans KR',sans-serif;font-size:12px;line-height:1.9;padding:12px;resize:none;outline:none;flex:1;min-height:180px;max-height:44vh}
.modal textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-md)}
.modal textarea::placeholder{color:var(--t3)}
.modal-acts{display:flex;gap:8px}
.modal-acts .btn{flex:1;text-align:center;padding:11px}
.legend{display:flex;flex-wrap:wrap;gap:5px 11px;padding:10px 12px;background:var(--acc-lt);border-radius:8px;border:1px solid var(--acc-md);font-size:11px;font-weight:500;line-height:1.8}
.leg-section{color:var(--t3);font-size:10px;font-weight:400;width:100%;margin-bottom:-3px}

<script>
/* ═══ CONSTANTS ═══ */
const DAYS=['일','월','화','수','목','금','토'];
const MONS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ALL_R=['단계향상','단계유지','만남중','연기','탈락전','탈락후'];
const R_ICON={'단계향상':'🎉','단계유지':'✔️','만남중':'🎵','연기':'🔺','탈락전':'❌','탈락후':'🚫'};
const R_CLS ={'단계향상':'r-up','단계유지':'r-ke','만남중':'r-on','연기':'r-dl','탈락전':'r-dp','탈락후':'r-da'};
const R_CLR ={'단계향상':'#15803d','단계유지':'#1d4ed8','만남중':'#7c3aed','연기':'#ea580c','탈락전':'#b91c1c','탈락후':'#6b7280'};
const R_RANK={'탈락후':1,'탈락전':2,'연기':3,'만남중':4,'단계유지':5,'단계향상':6};
const CF_RANK={null:0,'미확티':1,'전티완료':2,'확티':3};
const CF_CLS={'미확티':'cf-un-badge','전티완료':'cf-pt-badge','확티':'cf-ok-badge'};
const CF_ICON={'미확티':'🔴','전티완료':'🟡','확티':'🟢'};

function isPre(m){return !m.resultStatus;}

/* ═══ STATE ═══ */
let db={meetings:[]};
let purposeMap={};
let stageOrder=[];
let curRegion='전체',curView='list';
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let selMon=null;
let weekStart=weekOf(new Date()),selWk=null;
let activeFilter=null;
let adminAuth=false;
let curCohort='전체';
let curAdminView='settings';
let regionList=[]; // 지역 목록 (관리자 수정 가능)
let cohortList=[]; // 개강 목록

const ADMIN_PASS='1234'; // ← 관리자 비밀번호

/* ── GEMINI API KEY ── */
function getApiKey(){return localStorage.getItem('mtg-gemini-key')||'';}
function setApiKey(k){localStorage.setItem('mtg-gemini-key',k);}

function weekOf(d){const r=new Date(d);r.setHours(0,0,0,0);r.setDate(r.getDate()-r.getDay());return r;}

/* ═══ CONFIG ═══ */
const SB_URL='https://zjkrvkaakrhaptwbqfzo.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3J2a2Fha3JoYXB0d2JxZnpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODc0MjgsImV4cCI6MjA5MjE2MzQyOH0.UQwt3pagP8D7BJKfyr8LDeb3XytYVYU8t6YLvkoGOWw';
const SB_ID='00000000-0000-0000-0000-000000000001';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

/* ═══ AUTH CHECK ═══ */
function getSession(){
  try{return JSON.parse(sessionStorage.getItem('mtg-user'));}catch{return null;}
}
function getEncKey(){return sessionStorage.getItem('mtg-enc-key')||'';}

/* ═══ AES-256-GCM 암호화 ═══ */
async function getAESKey(encKey){
  const raw=new TextEncoder().encode(encKey.padEnd(32,'0').slice(0,32));
  return crypto.subtle.importKey('raw',raw,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function encrypt(plaintext,encKey){
  if(!encKey)return btoa(plaintext); // 키 없으면 base64만 (폴백)
  const key=await getAESKey(encKey);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plaintext));
  const combined=new Uint8Array(iv.byteLength+enc.byteLength);
  combined.set(iv,0);combined.set(new Uint8Array(enc),iv.byteLength);
  return btoa(String.fromCharCode(...combined));
}
async function decrypt(ciphertext,encKey){
  if(!encKey)return atob(ciphertext); // 키 없으면 base64만 (폴백)
  try{
    const combined=Uint8Array.from(atob(ciphertext),c=>c.charCodeAt(0));
    const iv=combined.slice(0,12),data=combined.slice(12);
    const key=await getAESKey(encKey);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
    return new TextDecoder().decode(dec);
  }catch{
    // 구형 포맷(암호화 전) base64로 폴백
    try{return atob(ciphertext);}catch{return ciphertext;}
  }
}

/* ═══ STORAGE (Supabase + AES-256) ═══ */

async function load(){
  // 로그인 확인
  const session=getSession();
  if(!session){window.location.href='index.html';return;}
  // 헤더에 사용자 표시
  const userEl=document.getElementById('hdr-user-name');
  if(userEl)userEl.textContent=session.name;

  const encKey=getEncKey();
  try{
    // 로컬 캐시로 빠르게 먼저 표시
    const cache=localStorage.getItem('mtg-cache');
    if(cache){
      const s=JSON.parse(cache);
      db=s.db||{meetings:[]};purposeMap=s.purposeMap||{};
      stageOrder=s.stageOrder||[];regionList=s.regionList||[];cohortList=s.cohortList||[];
    }
    render();
    // Supabase에서 최신 데이터
    const resp=await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${SB_ID}&select=data`,{headers:SB_HDR});
    const rows=await resp.json();
    if(rows&&rows[0]&&rows[0].data){
      const raw=rows[0].data;
      let saved=raw;
      // 암호화된 데이터면 복호화
      if(raw.encrypted){
        const plain=await decrypt(raw.encrypted,encKey);
        saved=JSON.parse(plain);
      }
      db=saved.db||{meetings:[]};
      purposeMap=saved.purposeMap||{};
      stageOrder=saved.stageOrder||[];
      regionList=saved.regionList||[];
      cohortList=saved.cohortList||[];
      localStorage.setItem('mtg-cache',JSON.stringify({db,purposeMap,stageOrder,regionList,cohortList}));
      render();
    }
  }catch(e){console.warn('load error:',e);}
}

async function save(){
  const payload={db,purposeMap,stageOrder,regionList,cohortList};
  localStorage.setItem('mtg-cache',JSON.stringify(payload));
  const encKey=getEncKey();
  try{
    let dataToStore;
    if(encKey){
      // AES-256 암호화 후 저장
      const cipher=await encrypt(JSON.stringify(payload),encKey);
      dataToStore={encrypted:cipher};
    } else {
      dataToStore=payload;
    }
    await fetch(`${SB_URL}/rest/v1/meetings?id=eq.${SB_ID}`,{
      method:'PATCH',
      headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({data:dataToStore})
    });
  }catch(e){console.warn('save error:',e);}
}

/* ═══ PURPOSE RESOLUTION ═══ */
function resolvePurpose(raw){return purposeMap[raw]||raw;}

/* 단계 정렬 순서: stageOrder 배열 기준, 없으면 알파벳 */
function stageRank(key){
  const idx=stageOrder.indexOf(key);
  return idx===-1?9999:idx;
}
function sortGroups(groups){
  return groups.sort((a,b)=>{
    const ka=a.stage||a.purpose||'z', kb=b.stage||b.purpose||'z';
    const ra=stageRank(ka), rb=stageRank(kb);
    if(ra!==rb)return ra-rb;
    return ka.localeCompare(kb);
  });
}

/* ═══ DEDUP KEY — 섭+인 2명만 (교 변경 허용) ═══ */
function mkey(m){
  const parts=(m.people||'').replace(/\s/g,'').toLowerCase().split('-').filter(Boolean);
  return `${m.date}|${parts.slice(0,2).join('-')}`;
}
/* ═══ MERGE ═══ */
function mergeIn(region,meetings){
  let added=0,updated=0;
  const idx={};db.meetings.forEach((m,i)=>idx[mkey(m)]=i);
  meetings.forEach(inc=>{
    inc.region=region;
    if(inc.cohort){}// cohort already set in parseStructured
    const k=mkey(inc);
    if(idx[k]===undefined){
      inc.addedAt=inc.updatedAt=new Date().toISOString();
      inc.history=[];
      db.meetings.push(inc);
      idx[k]=db.meetings.length-1;
      added++;
    } else {
      const ex=db.meetings[idx[k]];let changed=false;
      // resultStatus: 더 높은 것으로만
      if(inc.resultStatus&&(R_RANK[inc.resultStatus]||0)>(R_RANK[ex.resultStatus]||0)){
        if(!ex.history)ex.history=[];
        ex.history.push({resultStatus:ex.resultStatus,confirmStatus:ex.confirmStatus,ts:ex.updatedAt});
        ex.resultStatus=inc.resultStatus;changed=true;
      }
      // confirmStatus: 결과 없을 때만, 더 높은 것으로
      if(!ex.resultStatus&&(CF_RANK[inc.confirmStatus]||0)>(CF_RANK[ex.confirmStatus]||0)){
        ex.confirmStatus=inc.confirmStatus;changed=true;
      }
      // stage: 기존에 값 없으면 새 보고서 값으로 채움, 있으면 유지
      if(inc.stage&&!ex.stage){ex.stage=inc.stage;changed=true;}
      // 교(3번째 사람) 변경 허용
      if(inc.people&&inc.people!==ex.people){ex.people=inc.people;changed=true;}
      if(inc.purpose&&inc.purpose!==ex.purpose){}// purpose는 덮어쓰지 않음 (매핑 우선)
      if(inc.nextMeeting){ex.nextMeeting=inc.nextMeeting;changed=true;}
      if(inc.note){ex.note=inc.note;changed=true;}
      if(inc.time&&!ex.resultStatus&&inc.time!==ex.time){ex.time=inc.time;changed=true;}
      if(changed){ex.updatedAt=new Date().toISOString();updated++;}
    }
  });
  // 새 purpose 수집 (purposeMap에 없으면 추가)
  meetings.forEach(m=>{if(m.purpose&&!purposeMap[m.purpose])purposeMap[m.purpose]=m.purpose;});
  return {added,updated};
}

/* ═══ PARSE DATE HELPER ═══ */
function parseKorDate(raw){
  if(!raw)return null;
  raw=raw.trim();
  const today=new Date();
  const y=today.getFullYear();
  if(raw==='오늘')return today.toISOString().slice(0,10);
  if(raw==='내일'){const d=new Date(today);d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
  if(raw==='모레'){const d=new Date(today);d.setDate(d.getDate()+2);return d.toISOString().slice(0,10);}
  // M.D / M/D / M월D일
  const m=raw.match(/^(\d{1,2})[./월](\d{1,2})/);
  if(m)return `${y}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`;
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;
  return null;
}

function mapResultText(raw){
  if(!raw)return{confirmStatus:'미확티',resultStatus:null};
  const r=raw.trim();
  if(/단계.?향상|향상/.test(r))return{confirmStatus:'확티',resultStatus:'단계향상'};
  if(/만남.?유지|단계.?유지|유지/.test(r))return{confirmStatus:'확티',resultStatus:'단계유지'};
  if(/만남.?중/.test(r))return{confirmStatus:'확티',resultStatus:'만남중'};
  if(/연기/.test(r))return{confirmStatus:'확티',resultStatus:'연기'};
  if(/만남.?전.?탈락|탈락.?전/.test(r))return{confirmStatus:null,resultStatus:'탈락전'};
  if(/만남.?후.?탈락|탈락.?후/.test(r))return{confirmStatus:'확티',resultStatus:'탈락후'};
  if(/확티/.test(r))return{confirmStatus:'확티',resultStatus:null};
  if(/전티/.test(r))return{confirmStatus:'전티완료',resultStatus:null};
  if(/미확티/.test(r))return{confirmStatus:'미확티',resultStatus:null};
  return{confirmStatus:'미확티',resultStatus:null};
}

/* ── 구조화 형식 감지 (슬래시 7개 이상 행이 있으면) ── */
function isStructured(txt){
  return txt.split('\n').some(l=>l.trim().split('/').length>=7 && !/^[📅➖🔴🟡🟢🎉✔✅🎵🔺❌🚫]/.test(l.trim()));
}

/* ── 구조화 형식 파싱 (AI 없이 JS로) ──
   헤더: N월 개강/OO지역
   컬럼: 타겟/단계/섭외방식/섭-인-교/최근만남일/만남목적/만남결과/다음만남일/만남시간/다음만남목적/확티체크
*/
function parseStructured(txt){
  const lines=txt.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  let region='미분류',startIdx=0;

  // 헤더: "4월 개강/명동지역"
  const hdr=lines[0].match(/(.+개강)\s*[\/\s]\s*(.+지역)/);
  let cohort='미분류';
  if(hdr){cohort=hdr[1].replace(/\s/g,'');region=hdr[2].replace('지역','').trim();startIdx=1;}
  else{
    // 헤더 없으면 첫 줄이 데이터 — selects에서 받은 값 사용
    cohort=''; region=''; // doParseAdd에서 override됨
  }

  // 컬럼 헤더 행 건너뛰기 (실제 헤더 텍스트 포함 시에만)
  if(lines[startIdx]&&lines[startIdx].includes('섭-인-교')&&lines[startIdx].includes('만남목적'))startIdx++;

  const meetings=[];
  for(let i=startIdx;i<lines.length;i++){
    const line=lines[i];
    if(!line||line.startsWith('//'))continue;
    const p=line.split('/');
    if(p.length<6)continue;

    // 타겟/단계/방식/섭-인-교/최근만남일/만남목적/만남결과/다음만남일/만남시간/다음만남목적/확티체크
    const ageGroup  =p[0]?.trim()||null;
    const stage     =p[1]?.trim()||null;
    const method    =p[2]?.trim()||null;
    const people    =p[3]?.trim()||null;
    const dateRaw   =p[4]?.trim()||null;
    const purpose   =p[5]?.trim()||null;
    const resultRaw =p[6]?.trim()||null;
    const nextDateRaw=p[7]?.trim()||null;
    const nextTime  =p[8]?.trim()||null;
    const nextPurpose=p[9]?.trim()||null;
    const nextCfRaw =p[10]?.trim()||null;

    const date=parseKorDate(dateRaw);
    if(!date||!people)continue;

    const{confirmStatus:curCf,resultStatus}=mapResultText(resultRaw);
    // 결과가 있으면 현재 만남은 확티 확정
    const confirmStatus=resultStatus?'확티':curCf;

    // 다음만남 표시용 텍스트
    let nextMeeting=null;
    const ndParts=[];
    if(nextDateRaw)ndParts.push(nextDateRaw);
    if(nextTime)ndParts.push(nextTime);
    if(nextPurpose)ndParts.push(nextPurpose);
    if(ndParts.length)nextMeeting=ndParts.join(' ');

    /* ① 현재 만남 레코드 */
    meetings.push({
      date,stage,purpose,time:null,
      ageGroup,method,people,
      confirmStatus,resultStatus,
      nextMeeting,note:null,cohort
    });

    /* ② 다음 만남 레코드 자동 생성 */
    if(nextDateRaw&&nextDateRaw.trim()){
      const futureDate=parseKorDate(nextDateRaw.trim());
      if(futureDate&&futureDate!==date){
        const{confirmStatus:futureCf}=mapResultText(nextCfRaw||'미확티');
        meetings.push({
          date:futureDate,
          stage,                      // 현재 보고 기준 단계
          purpose:nextPurpose||null,
          time:nextTime&&nextTime!=='시간미정'?nextTime:null,
          ageGroup,method,people,
          confirmStatus:futureCf||'미확티',
          resultStatus:null,
          nextMeeting:null,
          note:null,cohort
        });
      }
    }
  }
  return{region,meetings};
}

/* ═══ PARSE + ADD ═══ */
async function doParseAdd(){
  const txt=document.getElementById('txtInput').value.trim();
  if(!txt)return;
  const selCohort=document.getElementById('sel-cohort')?.value||'';
  const selRegion=document.getElementById('sel-region')?.value||'';
  if(!selCohort){alert('개강을 선택해주세요');return;}
  if(!selRegion){alert('지역을 선택해주세요');return;}
  const btn=document.getElementById('parseBtn'),lbl=document.getElementById('parseBtnTxt'),err=document.getElementById('errBox');
  err.style.display='none';btn.disabled=true;lbl.innerHTML='<span class="spin"></span> 분석 중...';

  try{
    let parsed;

    if(isStructured(txt)){
      /* 구조화 형식 → JS 직접 파싱 (API 불필요) */
      lbl.innerHTML='<span class="spin"></span> 파싱 중...';
      parsed=parseStructured(txt);
    } else {
      /* 이모지 형식 → Gemini API 호출 */
      const apiKey=getApiKey();
      if(!apiKey){
        err.textContent='이모지 형식은 Gemini API 키가 필요합니다. 🔒 관리 탭에서 입력해주세요.\n구조화 형식(슬래시 구분)은 API 없이 바로 사용 가능합니다.';
        err.style.display='block';btn.disabled=false;lbl.textContent='분석 후 추가';return;
      }
      const now=new Date(),y=now.getFullYear(),mo=now.getMonth()+1,d=now.getDate();
      const prompt=`현재:${y}년${mo}월${d}일. JSON만 반환. 코드블록금지.
이모지→confirmStatus: 🔴=미확티 🟡=전티완료 🟢=확티
이모지→resultStatus: 🎉=단계향상 ✔️=단계유지 ✅=단계유지 🎵=만남중 🔺=연기 ❌=탈락전 🚫=탈락후
헤더"#XX지역"→region. 날짜"📅N월N일"→${y}년YYYY-MM-DD. "➖내용"→purpose.
만남줄: 이모지+시간/연령/단계/방식/이름들(하이픈구분). 슬래시5개=단계있음,4개=단계null.
결과이모지→resultStatus+confirmStatus="확티". 확인이모지→confirmStatus만.
반환:{"region":"","meetings":[{"date":"","stage":null,"purpose":"","time":null,"ageGroup":"","method":"","people":"","confirmStatus":null,"resultStatus":null,"nextMeeting":null,"note":null}]}
텍스트: ${txt}`;
      const resp=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`,
        {method:'POST',headers:{'Content-Type':'application/json'},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,maxOutputTokens:2000}})});
      const data=await resp.json();
      if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
      const raw=data.candidates[0].content.parts[0].text.trim().replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'');
      parsed=JSON.parse(raw);
    }

    // selRegion/selCohort override parsed values
    if(selRegion)parsed.region=selRegion;
    if(selCohort)(parsed.meetings||[]).forEach(m=>m.cohort=selCohort);
    const{added,updated}=mergeIn(parsed.region||selRegion||'미분류',parsed.meetings||[]);
    save();document.getElementById('txtInput').value='';
    closeModal();render();
    showToast(`신규 ${added}건 추가 · ${updated}건 업데이트`);
  }catch(e){err.textContent='파싱 오류: '+e.message;err.style.display='block';}
  finally{btn.disabled=false;lbl.textContent='분석 후 추가';}
}

function renderMain(){
  if(curView==='settings'){renderSettings();return;}
  if(curView==='edit'){renderEdit();return;}
  const base=filtered();
  renderSumbar(base);
  const list=applyFilter(base);
  if(curView==='list')renderList(list);
  else if(curView==='month')renderMonth(list);
  else renderWeek(list);

function applyFilter(list){
  if(!activeFilter)return list;
  if(activeFilter.type==='cf')return list.filter(m=>isPre(m)&&(m.confirmStatus||'미확티')===activeFilter.value);
  if(activeFilter.type==='result')return list.filter(m=>!isPre(m)&&m.resultStatus===activeFilter.value);
  if(activeFilter.type==='fb')return list.filter(m=>(m.feedback||'')===(activeFilter.value||''));
  return list;
}

function setFeedback(key,val){
  const m=db.meetings.find(x=>mkey(x)===key);
  if(!m)return;
  m.feedback=val;
  save();
  renderMain(); // re-render to update chip colors
}

function toggleFilter(type,value){
  if(activeFilter&&activeFilter.type===type&&activeFilter.value===value)activeFilter=null;
  else activeFilter={type,value};
  renderMain();
}

/* ── SUMBAR ── */
function renderSumbar(list){
  const sb=document.getElementById('sumbar');
  if(!list.length){sb.style.display='none';activeFilter=null;return;}
  sb.style.display='flex';sb.style.flexDirection='column';sb.style.gap='8px';
  const pre=list.filter(isPre),done=list.filter(m=>!isPre(m));
  const cfC={'미확티':0,'전티완료':0,'확티':0};
  pre.forEach(m=>{if(m.confirmStatus&&cfC[m.confirmStatus]!==undefined)cfC[m.confirmStatus]++;});
  const rC={};ALL_R.forEach(s=>rC[s]=done.filter(m=>m.resultStatus===s).length);
  const cfColors={'미확티':'var(--cf-un)','전티완료':'var(--cf-pt)','확티':'var(--cf-ok)'};
  const fbC={'done':list.filter(m=>m.feedback==='done').length,'plan':list.filter(m=>m.feedback==='plan').length,'':list.filter(m=>!m.feedback).length};

  const isActive=(type,val)=>activeFilter&&activeFilter.type===type&&activeFilter.value===val;
  const chipStyle=(type,val,dotColor)=>{
    const act=isActive(type,val);
    return `cursor:pointer;transition:all .13s;${act?`background:${dotColor};border-color:${dotColor};outline:2px solid ${dotColor};outline-offset:1px;`:''}`;
  };

  const filtered_cnt=applyFilter(list).length;
  const clearBtn=activeFilter?`<div class="s-total" style="background:var(--acc);color:#1a1400;cursor:pointer;margin-left:auto" onclick="activeFilter=null;renderMain()">✕ ${filtered_cnt}건</div>`:`<div class="s-total" style="margin-left:auto">총 ${list.length}건</div>`;

  // 행 1: 피드백
  let row1=`<div class="sumbar-row"><span class="sumbar-label">피드백</span>`;
  [['done','✅ 완료','#15803d'],['plan','📝 예정','#b45309'],['','⬜ 미정','#9ca3af']].forEach(([val,label,color])=>{
    if(!fbC[val]&&val!=='')return;
    const act=isActive('fb',val);
    row1+=`<div class="s-chip" style="${chipStyle('fb',val,color)}" onclick="toggleFilter('fb','${val}')">
      <div class="sdot" style="background:${act?'#fff':color}"></div>
      <span class="sl" style="${act?'color:#fff':''}">${label}</span>
      <span class="sv" style="${act?'color:#fff':''}">${fbC[val]}</span>
    </div>`;
  });
  row1+=clearBtn+'</div>';

  // 행 2: 예정(확인티켓)
  let row2=`<div class="sumbar-row"><span class="sumbar-label">예정</span>`;
  ['미확티','전티완료','확티'].forEach(s=>{
    const cnt=cfC[s];const act=isActive('cf',s);const dim=cnt===0;
    row2+=`<div class="s-chip" style="${dim?'opacity:.35;cursor:default':chipStyle('cf',s,cfColors[s])}" ${!dim?`onclick="toggleFilter('cf','${s}')"`:''}">
      <div class="sdot" style="background:${act?'#fff':cfColors[s]}"></div>
      <span class="sl" style="${act?'color:#fff':'color:'+cfColors[s]}">${CF_ICON[s]} ${s}</span>
      <span class="sv" style="${act?'color:#fff':''}">${cnt}</span>
    </div>`;
  });
  row2+='</div>';

  // 행 3: 결과
  let row3=`<div class="sumbar-row"><span class="sumbar-label">결과</span>`;
  ALL_R.filter(s=>rC[s]>0).forEach(s=>{
    const act=isActive('result',s);
    row3+=`<div class="s-chip" style="${chipStyle('result',s,R_CLR[s])}" onclick="toggleFilter('result','${s}')">
      <div class="sdot" style="background:${act?'#fff':R_CLR[s]}"></div>
      <span class="sl" style="${act?'color:#fff':''}">${R_ICON[s]} ${s}</span>
      <span class="sv" style="${act?'color:#fff':''}">${rC[s]}</span>
    </div>`;
  });
  row3+='</div>';

  sb.innerHTML=row1+row2+row3;
}

function renderList(list){

  // group: date → stage → purpose → meetings
  const byDate={};
  list.forEach(m=>{

    if(!byDate[m.date])byDate[m.date]={};
    // key: stage코드 + purpose 조합
    const sgKey=`${m.stage||''}|${p}`;
    if(!byDate[m.date][sgKey])byDate[m.date][sgKey]={stage:m.stage,purpose:p,items:[]};
    byDate[m.date][sgKey].items.push(m);
  });

  const today=new Date().toISOString().slice(0,10);
  let h='';
  Object.keys(byDate).sort().forEach(date=>{
    const dt=new Date(date+'T00:00:00');
    const mm=+date.slice(5,7),dd=+date.slice(8,10);
    const all=Object.values(byDate[date]).flatMap(g=>g.items);
    const upCnt=all.filter(m=>m.resultStatus==='단계향상').length;
    const preCnt=all.filter(isPre).length;
    h+=`<div class="dg">
      <div class="dg-hdr">
        <span class="dg-pill">${mm}/${dd}</span>
        <span class="dg-day">${DAYS[dt.getDay()]}요일</span>
        ${date===today?'<span class="dg-today">오늘</span>':''}

        <span class="dg-cnt">${all.length}건</span>
      </div>`;
    // sort groups by stageOrder then name
    const groups=sortGroups(Object.values(byDate[date]));
    groups.forEach(g=>{
      const ms=g.items;
      const upS=ms.filter(m=>m.resultStatus==='단계향상').length;
      const preS=ms.filter(isPre).length;
      ms.sort((a,b)=>{
        // pre 먼저 → cf rank 내림차순, done은 result rank 내림차순
        const aP=isPre(a),bP=isPre(b);
        if(aP&&!bP)return -1;if(!aP&&bP)return 1;
        if(aP&&bP)return (CF_RANK[b.confirmStatus]||0)-(CF_RANK[a.confirmStatus]||0);
        return (R_RANK[b.resultStatus]||0)-(R_RANK[a.resultStatus]||0);
      });
      h+=`<div class="sg">
        <div class="sg-hdr" onclick="toggleSg(this)">
          ${g.stage?`<span class="sg-name">${g.stage}</span>`:''}
          <span class="sg-purpose">${g.purpose||''}</span>
          <span class="sg-cnt">${ms.length}</span>
          ${upS?`<span class="sg-up">↑ 향상 ${upS}</span>`:''}
          ${preS?`<span class="sg-pre">예정 ${preS}</span>`:''}
          ${curRegion==='전체'&&ms[0]?.region?`<span class="sg-reg">${ms[0].region}</span>`:''}
          <span class="sg-tog">▾</span>
        </div>
        <div class="sg-body">`;
      ms.forEach(m=>h+=cardHTML(m,curRegion==='전체'));
      h+='</div></div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function toggleSg(hdr){
  const b=hdr.nextElementSibling,t=hdr.querySelector('.sg-tog');
  const open=b.style.display!=='none';
  b.style.display=open?'none':'';
  t.textContent=open?'▸':'▾';
}

/* ── CARD HTML ── */
function cardHTML(m,showReg=false){
  const pre=isPre(m);
  let cardCls='';
  if(pre){const cf=m.confirmStatus||'미확티';cardCls=`pre-${cf==='미확티'?'un':cf==='전티완료'?'pt':'ok'}`;}
  else{cardCls=R_CLS[m.resultStatus]||'';}

  const ico=pre?'':(R_ICON[m.resultStatus]||'');
  const time=m.time||'시간미정';
  const wasUpd=m.updatedAt&&m.updatedAt!==m.addedAt;

  // confirmStatus badge — 만남 예정(pre)에서만 표시
  const cfCls=CF_CLS[m.confirmStatus||'미확티']||'cf-un-badge';
  const cfIcon=CF_ICON[m.confirmStatus||'미확티']||'🔴';
  const cfLabel=m.confirmStatus||'미확티';
  const isUn=cfLabel==='미확티';
  const cfBadge=`<span class="cf-badge ${cfCls}${isUn?' urgent-ring':''}">${cfIcon} ${cfLabel}</span>`;

  const histLine=(m.history&&m.history.length)?`<div class="mc-hist">이전: ${m.history.map(h=>`${h.resultStatus?R_ICON[h.resultStatus]||'':''}${h.resultStatus||''}`).filter(s=>s.trim()).join(' → ')}</div>`:''
  const fbCls=m.feedback==='done'?'fb-done':m.feedback==='plan'?'fb-plan':'fb-none';

  // 태그 순서: 단계코드 → 연령 → 섭외방식 → 지역
  const stagePurposeLabel = m.stage || '';

  return `<div class="mc ${cardCls}${wasUpd?' upd-ring':''}" style="display:flex;align-items:flex-start;gap:8px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:38px">
      <div class="mc-ico">${ico||''}</div>
      <div class="mc-time">${time==='시간미정'?'미정':time}</div>
    </div>
    <div class="mc-body" style="flex:1;min-width:0">
      <div class="mc-top">
        ${pre?cfBadge:''}
        <span class="mc-people">${m.people||''}</span>
        <div class="mc-tags">
          ${stagePurposeLabel?`<span class="tag" style="font-weight:700;color:var(--t1);background:var(--s3);border-color:var(--bd2)">${stagePurposeLabel}</span>`:''}
          ${m.ageGroup?`<span class="tag">${m.ageGroup}</span>`:''}
          ${m.method?`<span class="tag">${m.method}</span>`:''}
          ${showReg&&m.region?`<span class="tag" style="color:var(--acc-tx);background:var(--acc-lt);border-color:var(--acc-md)">${m.region}</span>`:''}
        </div>
      </div>
      ${m.note?`<div class="mc-sub" style="color:var(--t3)">${m.note}</div>`:''}
      ${m.nextMeeting?`<div class="mc-next">${m.nextMeeting}</div>`:''}
      ${histLine}
    </div>
    <select class="fb-select ${fbCls}" onchange="setFeedback(${JSON.stringify(mkey(m))},this.value)" title="피드백 상태">
      <option value="" ${!m.feedback?'selected':''}>피드백 미정</option>
      <option value="done" ${m.feedback==='done'?'selected':''}>✅ 피드백 완료</option>
      <option value="plan" ${m.feedback==='plan'?'selected':''}>📝 피드백 예정</option>
    </select>
  </div>`;
}

/* 단계 컬러 (해시) */
const PALETTE=['#FAC608','#3b82f6','#10b981','#8b5cf6','#f97316','#ec4899','#06b6d4','#84cc16','#f43f5e','#0ea5e9'];
function stageColor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffff;return PALETTE[Math.abs(h)%PALETTE.length];}

/* ════════════════════
   MONTH VIEW
════════════════════ */
function calMove(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}selMon=null;renderMonth(filtered());}

function renderMonth(list){
  const t=document.getElementById('monTitle'),g=document.getElementById('monGrid');
  if(!t||!g)return;
  t.textContent=`${calYear}년 ${MONS[calMonth]}`;
  const fdow=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  const pfx=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const byDate={};
  list.forEach(m=>{if(m.date&&m.date.startsWith(pfx))(byDate[m.date]=byDate[m.date]||[]).push(m);});

  const dc=['color:#b91c1c','','','','','','color:#1d4ed8'];
  let h=DAYS.map((d,i)=>`<div class="cal-dow" style="${dc[i]}">${d}</div>`).join('');
  for(let i=0;i<fdow;i++)h+=`<div class="mon-cell empty"></div>`;

  for(let d=1;d<=dim;d++){
    const ds=`${pfx}-${String(d).padStart(2,'0')}`;
    const ms=byDate[ds]||[];
    const isToday=ds===today,isSel=ds===selMon;
    const hasUp=ms.some(m=>m.resultStatus==='단계향상');

    // stage summary
    const stMap={};
    ms.forEach(m=>{
      const p=resolvePurpose(m.purpose||'');
      const k=m.stage?`${m.stage} · ${p}`:p;
      if(!stMap[k])stMap[k]={cnt:0,color:stageColor(m.stage||p)};
      stMap[k].cnt++;
    });
    const stRows=Object.entries(stMap).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,4).map(([name,v])=>`
      <div class="mon-stage-row">
        <div class="mon-bar" style="background:${v.color};width:${Math.max(6,Math.round(v.cnt/Math.max(...Object.values(stMap).map(x=>x.cnt))*34))}px"></div>
        <div class="mon-sl">${name}</div>
        <div class="mon-sc">${v.cnt}</div>
      </div>`).join('');

    const rCnts={};ms.filter(m=>!isPre(m)).forEach(m=>rCnts[m.resultStatus]=(rCnts[m.resultStatus]||0)+1);
    const preDots=ms.filter(isPre).slice(0,4).map(m=>{
      const c=m.confirmStatus||'미확티';
      const dc2={'미확티':'var(--cf-un)','전티완료':'var(--cf-pt)','확티':'var(--cf-ok)'};
      return `<div class="mon-dot" style="background:${dc2[c]};border:1px solid var(--bd)" title="${c}"></div>`;
    }).join('');
    const rDots=ALL_R.filter(s=>rCnts[s]).map(s=>`<div class="mon-dot" style="background:${R_CLR[s]}" title="${R_ICON[s]} ${s} ${rCnts[s]}건"></div>`).join('');

    const cls=['mon-cell',isToday?'today':'',isSel?'selected':'',hasUp?'has-up':'',!ms.length?'no-mtg':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" ${ms.length?`onclick="doSelMon('${ds}')"`:''}>
      <div class="mon-row1"><span class="mon-dn">${d}</span>${ms.length?`<span class="mon-total">${ms.length}</span>`:''}</div>
      ${(preDots||rDots)?`<div class="mon-dots">${preDots}${rDots}</div>`:''}
      <div>${stRows}</div>
    </div>`;
  }
  g.innerHTML=h;
  renderMonDetail(byDate);
}

function doSelMon(ds){
  const l=filtered();const bd={};l.forEach(m=>(bd[m.date]=bd[m.date]||[]).push(m));
  if(!(bd[ds]||[]).length)return;
  selMon=selMon===ds?null:ds;renderMonth(l);
}
function renderMonDetail(byDate){
  const el=document.getElementById('monDetailPanel');if(!el)return;
  if(!selMon||!(byDate[selMon]||[]).length){
    el.innerHTML='<div class="cal-detail-empty">날짜를 클릭하면<br>여기에 표시됩니다</div>';return;
  }
  const ms=byDate[selMon];
  const dt=new Date(selMon+'T00:00:00'),mm=+selMon.slice(5,7),dd=+selMon.slice(8,10);
  const upCnt=ms.filter(m=>m.resultStatus==='단계향상').length;
  const preCnt=ms.filter(isPre).length;
  let h=`<div style="padding:12px 14px;background:var(--acc);border-bottom:1px solid var(--acc-dk);display:flex;align-items:center;gap:8px">
    <span style="font-size:14px;font-weight:700;color:#1a1400;font-family:'GangwonEduTt',sans-serif">${mm}월 ${dd}일 ${DAYS[dt.getDay()]}요일 — ${ms.length}건</span>
    ${upCnt?`<span style="font-size:11px;color:var(--r-up);background:var(--white);border-radius:5px;padding:2px 7px;font-weight:700">🎉 ${upCnt}</span>`:''}
    ${preCnt?`<span style="font-size:11px;color:var(--cf-ok);background:var(--white);border-radius:5px;padding:2px 7px;font-weight:700">예정 ${preCnt}</span>`:''}
    <button onclick="selMon=null;renderMonth(filtered())" style="margin-left:auto;background:rgba(0,0,0,.08);border:none;color:#1a1400;cursor:pointer;font-size:15px;padding:2px 8px;border-radius:4px;font-weight:700">✕</button>
  </div>`;
  h+=buildDayDetailBody(selMon,ms);
  el.innerHTML=h;
}

/* ════════════════════
   WEEK VIEW
════════════════════ */
function weekMove(dir){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+dir*7);selWk=null;renderWeek(filtered());}

function renderWeek(list){
  const wkEnd=new Date(weekStart);wkEnd.setDate(wkEnd.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('wkTitle').textContent=`${fmt(weekStart)} (${DAYS[weekStart.getDay()]}) – ${fmt(wkEnd)} (${DAYS[wkEnd.getDay()]})`;
  const today=new Date().toISOString().slice(0,10);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);days.push(d.toISOString().slice(0,10));}
  const byDate={};
  list.forEach(m=>{if(days.includes(m.date))(byDate[m.date]=byDate[m.date]||[]).push(m);});
  const allWk=Object.values(byDate).flat();
  const dc=['color:#b91c1c','','','','','','color:#1d4ed8'];

  /* ── 주간 단계별 요약 ── */
  // stageKey → {향상,유지,탈락,연기,만남중,예정}
  const wkStageMap={};
  allWk.forEach(m=>{
    const p=resolvePurpose(m.purpose||'기타');
    const k=m.stage?`${m.stage} · ${p}`:p;
    if(!wkStageMap[k])wkStageMap[k]={color:stageColor(m.stage||p),향상:0,유지:0,탈락:0,연기:0,만남중:0,예정:0};
    if(isPre(m))wkStageMap[k].예정++;
    else if(m.resultStatus==='단계향상')wkStageMap[k].향상++;
    else if(m.resultStatus==='단계유지')wkStageMap[k].유지++;
    else if(m.resultStatus==='탈락전'||m.resultStatus==='탈락후')wkStageMap[k].탈락++;
    else if(m.resultStatus==='연기')wkStageMap[k].연기++;
    else if(m.resultStatus==='만남중')wkStageMap[k].만남중++;
  });

  const statCols=[
    {key:'예정',  color:'var(--cf-ok)',   icon:'📅'},
    {key:'향상',  color:'var(--r-up)',    icon:'🎉'},
    {key:'유지',  color:'var(--r-ke)',    icon:'✔️'},
    {key:'탈락',  color:'var(--r-dp)',    icon:'❌'},
    {key:'연기',  color:'var(--r-dl)',    icon:'🔺'},
    {key:'만남중',color:'var(--r-on)',    icon:'🎵'},
  ];

  let summaryH=`<div style="background:var(--white);border:1px solid var(--bd);border-radius:11px;overflow:hidden;margin-bottom:16px">
    <div style="padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px">
      <span style="font-size:13px;font-weight:700">이번 주 요약</span>
      <span style="font-size:11px;color:var(--t2);font-family:'DM Mono',monospace">${fmt(weekStart)} – ${fmt(wkEnd)}</span>
      <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;background:var(--acc);color:#1a1400;border-radius:10px;padding:1px 10px;font-weight:700">총 ${allWk.length}건</span>
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:480px">
      <thead><tr style="border-bottom:1px solid var(--bd)">
        <th style="padding:7px 14px;text-align:left;font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;width:40%">단계 · 목적</th>
        ${statCols.map(c=>`<th style="padding:7px 8px;text-align:center;font-size:10px;color:${c.color};font-weight:700;letter-spacing:.04em">${c.icon} ${c.key}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  Object.entries(wkStageMap).sort((a,b)=>b[1].향상-a[1].향상||b[1].예정-a[1].예정).forEach(([name,v])=>{
    const total=v.향상+v.유지+v.탈락+v.연기+v.만남중+v.예정;
    summaryH+=`<tr style="border-bottom:1px solid var(--bd)" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      <td style="padding:8px 14px;display:flex;align-items:center;gap:6px">
        <div style="width:8px;height:8px;border-radius:50%;background:${v.color};flex-shrink:0"></div>
        <span style="font-weight:600;color:var(--t1)">${name}</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)">${total}</span>
      </td>
      ${statCols.map(c=>`<td style="padding:8px;text-align:center;font-family:'DM Mono',monospace;font-weight:700;color:${v[c.key]?c.color:'var(--t3)'};">${v[c.key]||'—'}</td>`).join('')}
    </tr>`;
  });

  if(!Object.keys(wkStageMap).length){
    summaryH+=`<tr><td colspan="7" style="padding:20px;text-align:center;color:var(--t3);font-size:12px">이번 주 만남 데이터가 없습니다</td></tr>`;
  }
  summaryH+=`</tbody></table></div></div>`;

  /* ── 7일 컬럼 ── */
  let h='';
  days.forEach((ds,i)=>{
    const d=new Date(ds+'T00:00:00');
    const ms=byDate[ds]||[];
    const isSel=ds===selWk,isToday=ds===today;
    const hdrCls=['wk-hdr',isToday?'today-h':'',isSel?'sel-h':'',!ms.length?'no-data':''].filter(Boolean).join(' ');
    const stMap={};
    ms.forEach(m=>{
      const p=resolvePurpose(m.purpose||'');
      const k=m.stage?`${m.stage}`:p;
      if(!stMap[k])stMap[k]={cnt:0,color:stageColor(k)};
      stMap[k].cnt++;
    });
    const pills=Object.entries(stMap).sort((a,b)=>b[1].cnt-a[1].cnt).map(([name,v])=>`
      <div class="wk-stage-pill" style="background:${v.color}18;border-color:${v.color}44" onclick="doSelWk('${ds}')">
        <span class="wk-sp-name" style="color:${v.color}">${name}</span>
        <span class="wk-sp-cnt">${v.cnt}</span>
      </div>`).join('');
    h+=`<div class="wk-col">
      <div class="${hdrCls}" ${ms.length?`onclick="doSelWk('${ds}')"`:''}> 
        <span class="wk-dow" style="${dc[i]}">${DAYS[i]}</span>
        <span class="wk-dn">${d.getDate()}</span>
        ${ms.length?`<span class="wk-cnt">${ms.length}</span>`:''}
      </div>
      <div class="wk-body">${pills}</div>
    </div>`;
  });

  document.getElementById('wkWrap').innerHTML=h;

  // inject summary BEFORE the grid
  const wkView=document.getElementById('weekView');
  let sumEl=document.getElementById('wkSummary');
  if(!sumEl){
    sumEl=document.createElement('div');sumEl.id='wkSummary';
    // insert before wk-wrap
    const wrapEl=document.getElementById('wkWrap');
    wkView.insertBefore(sumEl,wrapEl);
  }
  sumEl.innerHTML=summaryH;

  const ddEl=document.getElementById('wkDetail');
  if(!selWk||!(byDate[selWk]||[]).length){ddEl.style.display='none';return;}
  ddEl.style.display='block';
  ddEl.innerHTML=buildDayDetail(selWk,byDate[selWk],()=>{selWk=null;renderWeek(filtered());});
}

function doSelWk(ds){
  const l=filtered();const bd={};l.forEach(m=>(bd[m.date]=bd[m.date]||[]).push(m));
  if(!(bd[ds]||[]).length)return;
  selWk=selWk===ds?null:ds;renderWeek(l);
}

/* ── SHARED DAY DETAIL ── */
function buildDayDetailBody(ds,ms){
  // body only — no header (used by panel)
  const pre=ms.filter(isPre),done=ms.filter(m=>!isPre(m));
  const groupMtgs=(arr)=>{
    const g={};
    arr.forEach(m=>{
      const p=resolvePurpose(m.purpose||'기타');
      const k=`${m.stage||''}|${p}`;
      if(!g[k])g[k]={stage:m.stage,purpose:p,items:[]};
      g[k].items.push(m);
    });
    return Object.values(g).sort((a,b)=>(a.stage||'z').localeCompare(b.stage||'z'));
  };
  let h='';
  if(pre.length){
    h+=`<div style="padding:7px 12px 3px;font-size:11px;font-weight:700;color:var(--cf-ok);border-bottom:1px solid var(--bd)">📅 만남 예정</div>`;
    groupMtgs(pre).forEach(g=>{
      h+=`<div class="sg" style="margin:6px 10px;border-radius:8px"><div class="sg-hdr">${g.stage?`<span class="sg-name">${g.stage}</span>`:''}
        <span class="sg-purpose">${g.purpose}</span><span class="sg-cnt">${g.items.length}</span></div>`;
      g.items.sort((a,b)=>(CF_RANK[b.confirmStatus]||0)-(CF_RANK[a.confirmStatus]||0));
      g.items.forEach(m=>h+=cardHTML(m,curRegion==='전체'));h+='</div>';
    });
  }
  if(done.length){
    h+=`<div style="padding:7px 12px 3px;font-size:11px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd)${pre.length?';border-top:1px solid var(--bd);margin-top:4px':''}">✅ 만남 결과</div>`;
    groupMtgs(done).forEach(g=>{
      const upS=g.items.filter(m=>m.resultStatus==='단계향상').length;
      h+=`<div class="sg" style="margin:6px 10px;border-radius:8px"><div class="sg-hdr">${g.stage?`<span class="sg-name">${g.stage}</span>`:''}
        <span class="sg-purpose">${g.purpose}</span><span class="sg-cnt">${g.items.length}</span>${upS?`<span class="sg-up">↑ ${upS}</span>`:''}</div>`;
      g.items.sort((a,b)=>(R_RANK[b.resultStatus]||0)-(R_RANK[a.resultStatus]||0));
      g.items.forEach(m=>h+=cardHTML(m,curRegion==='전체'));h+='</div>';
    });
  }
  return h;
}

function buildDayDetail(ds,ms,onClose){
  const dt=new Date(ds+'T00:00:00'),mm=+ds.slice(5,7),dd=+ds.slice(8,10);
  const upCnt=ms.filter(m=>m.resultStatus==='단계향상').length;
  const preCnt=ms.filter(isPre).length;
  const pre=ms.filter(isPre),done=ms.filter(m=>!isPre(m));

  // group by stage+purpose
  const groupMtgs=(arr)=>{
    const g={};
    arr.forEach(m=>{
      const p=resolvePurpose(m.purpose||'기타');
      const k=`${m.stage||''}|${p}`;
      if(!g[k])g[k]={stage:m.stage,purpose:p,items:[]};
      g[k].items.push(m);
    });
    return Object.values(g).sort((a,b)=>(a.stage||'z').localeCompare(b.stage||'z'));
  };

  let h=`<div class="day-detail">
    <div class="dd-hdr">
      <span class="dd-title">${mm}월 ${dd}일 ${DAYS[dt.getDay()]}요일 — ${ms.length}건</span>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${preCnt?`<span class="dd-badge" style="color:var(--cf-un)">🔴미확티 ${ms.filter(m=>isPre(m)&&(m.confirmStatus||'미확티')==='미확티').length||''} ${ms.filter(m=>isPre(m)&&m.confirmStatus==='전티완료').length?`🟡전티 ${ms.filter(m=>isPre(m)&&m.confirmStatus==='전티완료').length}`:''} ${ms.filter(m=>isPre(m)&&m.confirmStatus==='확티').length?`🟢확티 ${ms.filter(m=>isPre(m)&&m.confirmStatus==='확티').length}`:''}</span>`:''}
        ${ALL_R.map(s=>{const c=done.filter(m=>m.resultStatus===s).length;return c?`<span class="dd-badge" style="color:${R_CLR[s]};background:white;border-radius:5px;padding:2px 7px;font-size:11px">${R_ICON[s]} ${s} ${c}</span>`:''}).join('')}
      </div>
      <button class="dd-close" onclick="(${onClose.toString()})()">✕</button>
    </div>`;

  if(pre.length){
    h+=`<div class="dd-sec-title">📅 만남 예정</div>`;
    groupMtgs(pre).forEach(g=>{
      h+=`<div class="sg" style="margin:8px 10px;border-radius:8px">
        <div class="sg-hdr">
          ${g.stage?`<span class="sg-name">${g.stage}</span>`:''}
          <span class="sg-purpose">${g.purpose}</span>
          <span class="sg-cnt">${g.items.length}</span>
        </div>`;
      g.items.forEach(m=>h+=cardHTML(m,curRegion==='전체'));
      h+='</div>';
    });
  }
  if(done.length){
    h+=`<div class="dd-sec-title" style="${pre.length?'border-top:1px solid var(--bd);margin-top:4px':''}">✅ 만남 결과</div>`;
    groupMtgs(done).forEach(g=>{
      const upS=g.items.filter(m=>m.resultStatus==='단계향상').length;
      h+=`<div class="sg" style="margin:8px 10px;border-radius:8px">
        <div class="sg-hdr">
          ${g.stage?`<span class="sg-name">${g.stage}</span>`:''}
          <span class="sg-purpose">${g.purpose}</span>
          <span class="sg-cnt">${g.items.length}</span>
          ${upS?`<span class="sg-up">↑ ${upS}</span>`:''}
        </div>`;
      g.items.sort((a,b)=>(R_RANK[b.resultStatus]||0)-(R_RANK[a.resultStatus]||0));
      g.items.forEach(m=>h+=cardHTML(m,curRegion==='전체'));
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

function updatePurposeMap(raw,val){purposeMap[raw]=val.trim()||raw;}

function renameRegion(oldName,newName){
  newName=newName.trim();
  if(!newName||newName===oldName)return;
  // update all meetings
  db.meetings.forEach(m=>{if(m.region===oldName)m.region=newName;});
  // update regionList
  const i=regionList.indexOf(oldName);
  if(i>=0)regionList[i]=newName;
  else regionList=regionList.filter(r=>r!==oldName);
  if(!regionList.includes(newName))regionList.push(newName);
  save();renderSettings();showToast(`${oldName} → ${newName} 변경됨`);
}
function deleteRegion(name){
  if(!confirm(`"${name}" 지역을 목록에서 삭제할까요?\n(만남 데이터는 유지됩니다)`))return;
  regionList=regionList.filter(r=>r!==name);
  save();renderSettings();showToast(`${name} 삭제됨`);
}
function addRegionFromSettings(){
  const v=prompt('새 지역 이름 입력');
  if(!v||!v.trim())return;
  const name=v.trim();
  if(!regionList.includes(name))regionList.push(name);
  save();renderSettings();
}
function addCohortFromSettings(){
  const v=prompt('새 개강 이름 입력 (예: 5월개강)');
  if(!v||!v.trim())return;
  const name=v.trim();
  if(!cohortList.includes(name))cohortList.push(name);
  save();renderSettings();
}
function deleteCohort(name){
  if(!confirm(`"${name}"을 개강 목록에서 삭제할까요?\n(만남 데이터는 유지됩니다)`))return;
  cohortList=cohortList.filter(c=>c!==name);
  save();renderSettings();showToast(`${name} 삭제됨`);
}
function resetPurposeMap(raw){purposeMap[raw]=raw;renderSettings();}

function moveStage(idx,dir){
  // rebuild current order list same way as renderSettings
  const allStageKeys=[...new Set(db.meetings.map(m=>m.stage||resolvePurpose(m.purpose||'기타')).filter(Boolean))];
  const orderList=[...stageOrder.filter(k=>allStageKeys.includes(k)),...allStageKeys.filter(k=>!stageOrder.includes(k))];
  const target=idx+dir;
  if(target<0||target>=orderList.length)return;
  [orderList[idx],orderList[target]]=[orderList[target],orderList[idx]];
  stageOrder=[...orderList];
  renderSettings();
}

async function saveStageOrder(){
  await save();showToast('순서 저장됨');
}

async function saveSettings(){
  await save();showToast('설정 저장됨');renderSettings();
}

      <span>✏️</span><span>만남 수정·삭제</span>

    h+=`<button class="sb-admin-item ${curView==='settings'?'active':''}" onclick="setView('settings')">

/* ════════════════════
   EDIT VIEW (관리자 만남 수정)
════════════════════ */
function renderEdit(){
  const el=document.getElementById('editWrap');
  if(!el)return;

  const list=filtered();
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><p>수정할 만남 데이터가 없습니다</p></div>`;
    return;
  }

  // group by date
  const byDate={};
  list.forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});

  let h=`<div style="margin-bottom:16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:14px;font-weight:700">만남 수정·삭제</span>
    <span style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace">${list.length}건</span>
  </div>`;

  Object.keys(byDate).sort().forEach(date=>{
    const ms=byDate[date];
    const dt=new Date(date+'T00:00:00');
    const mm=+date.slice(5,7),dd=+date.slice(8,10);
    h+=`<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--t2);padding:4px 0;margin-bottom:4px;border-bottom:1px solid var(--bd)">${mm}/${dd} ${['일','월','화','수','목','금','토'][dt.getDay()]}요일</div>`;
    ms.forEach(m=>{
      const idx=db.meetings.findIndex(x=>x===m);
      const pre=isPre(m);
      const status=pre?(m.confirmStatus||'미확티'):(m.resultStatus||'');
      const statusColor=pre?'var(--cf-un)':R_CLR[m.resultStatus]||'var(--t3)';
      h+=`<div style="background:var(--white);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:600;color:${statusColor};background:var(--s2);padding:1px 7px;border-radius:10px">${status}</span>
            <span style="font-size:13px;font-weight:700">${m.people||''}</span>
            ${m.stage?`<span style="font-size:10px;color:var(--t2);background:var(--s3);padding:1px 6px;border-radius:4px">${m.stage}</span>`:''}
          </div>
          <div style="font-size:11px;color:var(--t2)">${m.purpose||''} ${m.nextMeeting?'→ '+m.nextMeeting:''}</div>
        </div>
        <button class="btn btn-sm" onclick="openEditModal(${idx})" style="flex-shrink:0">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteMeeting(${idx})" style="flex-shrink:0">삭제</button>
      </div>`;
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function deleteMeeting(idx){
  const m=db.meetings[idx];
  if(!m)return;
  if(!confirm(`삭제할까요?\n${m.date} ${m.people}`))return;
  db.meetings.splice(idx,1);
  save();render();
  showToast('삭제됨');
}

function openEditModal(idx){
  const m=db.meetings[idx];
  if(!m)return;
  const fields=[
    {key:'date',label:'날짜',val:m.date||''},
    {key:'people',label:'섭-인-교',val:m.people||''},
    {key:'stage',label:'단계',val:m.stage||''},
    {key:'purpose',label:'만남목적',val:m.purpose||''},
    {key:'confirmStatus',label:'확인티켓',val:m.confirmStatus||''},
    {key:'resultStatus',label:'만남결과',val:m.resultStatus||''},
    {key:'nextMeeting',label:'다음만남',val:m.nextMeeting||''},
    {key:'note',label:'메모',val:m.note||''},
  ];
  const formHTML=fields.map(f=>`
    <div style="display:grid;grid-template-columns:80px 1fr;align-items:center;gap:8px;margin-bottom:8px">
      <label style="font-size:11px;font-weight:600;color:var(--t2)">${f.label}</label>
      <input id="ef-${f.key}" value="${(f.val+'').replace(/"/g,'&quot;')}"
        style="background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;color:var(--t1)"
        onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bd)'">
    </div>`).join('');

  // Reuse admin overlay with custom content
  document.getElementById('adminOverlay').classList.remove('hidden');
  document.getElementById('adminOverlay').innerHTML=`
    <div class="modal" style="max-height:90vh" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <span class="modal-title">만남 수정</span>
        <button class="btn btn-sm" onclick="document.getElementById('adminOverlay').classList.add('hidden')">✕</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding-right:4px">${formHTML}</div>
      <div class="modal-acts">
        <button class="btn" onclick="document.getElementById('adminOverlay').classList.add('hidden')" style="max-width:80px">취소</button>
        <button class="btn btn-acc" onclick="saveEditModal(${idx})">저장</button>
      </div>
    </div>`;
}

function saveEditModal(idx){
  const m=db.meetings[idx];
  if(!m)return;
  ['date','people','stage','purpose','confirmStatus','resultStatus','nextMeeting','note'].forEach(k=>{
    const el=document.getElementById('ef-'+k);
    if(el)m[k]=el.value.trim()||null;
  });
  m.updatedAt=new Date().toISOString();
  save();
  document.getElementById('adminOverlay').classList.add('hidden');
  document.getElementById('adminOverlay').innerHTML=originalAdminHTML;
  render();
  showToast('수정됨');
}

let originalAdminHTML='';

/* ════════════
   MODAL HELPERS
════════════ */
function getActiveCohorts(){
  // 데이터에서 수집 + cohortList 합치기 (중복 제거, 정렬)
  const fromData=[...new Set(db.meetings.map(m=>m.cohort).filter(Boolean))];
  const all=[...new Set([...cohortList,...fromData])];
  return all.sort((a,b)=>{
    const na=parseInt(a)||0,nb=parseInt(b)||0;
    return nb-na;
  });
}
function getActiveRegions(){
  const fromData=[...new Set(db.meetings.map(m=>m.region).filter(Boolean))];
  return [...new Set([...regionList,...fromData])].sort();
}

function populateSelects(){
  const cs=document.getElementById('sel-cohort');
  const rs=document.getElementById('sel-region');
  if(!cs||!rs)return;
  const cohorts=getActiveCohorts();
  const regions=getActiveRegions();
  const prevC=cs.value, prevR=rs.value;
  cs.innerHTML='<option value="">-- 개강 선택 --</option>'+cohorts.map(c=>`<option value="${c}">${c}</option>`).join('');
  rs.innerHTML='<option value="">-- 지역 선택 --</option>'+regions.map(r=>`<option value="${r}">${r}</option>`).join('');
  // 현재 필터와 같은 항목 기본 선택
  if(curCohort!=='전체')cs.value=curCohort;
  else if(prevC)cs.value=prevC;
  if(curRegion!=='전체')rs.value=curRegion;
  else if(prevR)rs.value=prevR;
}

// 개강/지역 추가는 관리자 페이지에서만 가능

/* ═══ MODAL ═══ */
function openModal(){document.getElementById('overlay').classList.remove('hidden');document.getElementById('dataInfo').textContent=`저장: ${db.meetings.length}건`;setTimeout(populateSelects,50);}
function closeModal(){document.getElementById('overlay').classList.add('hidden');document.getElementById('errBox').style.display='none';}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

/* ═══ TOAST ═══ */
function showToast(msg){
  const t=document.createElement('div');t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'28px',left:'50%',transform:'translateX(-50%)',background:'var(--t1)',color:'#fff',borderRadius:'20px',padding:'9px 20px',fontSize:'12px',zIndex:'999',fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',opacity:'0',transition:'opacity .2s'});
  document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2800);
}

originalAdminHTML=document.getElementById('adminOverlay').innerHTML;

function doLogout(){
  sessionStorage.removeItem('mtg-user');
  sessionStorage.removeItem('mtg-enc-key');
  localStorage.removeItem('mtg-cache');
  window.location.href='index.html';
}

load();
</script>
